<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Brezel Money</title>

<!-- PWA -->
<link rel="manifest" href="/money/manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="교민 가계부"/>
<meta name="theme-color" content="#111111"/>
<link rel="apple-touch-icon" href="/money/icons/icon-192.png"/>
<style>
@import "https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap";
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#111;--white:#fff;
  --gray-50:#f8f8f8;--gray-100:#f0f0f0;--gray-200:#e0e0e0;--gray-400:#999;--gray-600:#555;
  --accent:#FF7A50;
  --font:"DM Sans",sans-serif;--mono:"DM Mono",monospace;
  --radius:14px;--radius-sm:8px;
}
html,body,#root{background:var(--white);width:100%;height:100%;font-family:var(--font);color:var(--black);-webkit-font-smoothing:antialiased}
#root{background:var(--gray-50);justify-content:center;display:flex}
.app-shell{background:var(--white);flex-direction:column;width:100%;max-width:430px;min-height:100%;display:flex;position:relative}
h1{font-size:26px;font-weight:500;line-height:1.2}
h2{font-size:20px;font-weight:500}
p{line-height:1.6}
.text-muted{color:var(--gray-400);font-size:12px}
.page{flex:1;padding:16px 20px 100px;overflow-y:auto}
.section{margin-bottom:28px}
.section-title{letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);margin-bottom:12px;font-size:11px;font-weight:500}
.divider{background:var(--gray-200);height:.5px;margin:18px 0}
.row{border-bottom:.5px solid var(--gray-100);justify-content:space-between;align-items:center;padding:12px 0;display:flex}
.row:last-child{border-bottom:none}
.field{border:none;border-bottom:1px solid var(--gray-200);color:var(--black);width:100%;font-size:14px;font-family:var(--font);background:transparent;outline:none;padding:6px 0;transition:border-color .2s}
.field:focus{border-color:var(--black)}
.field::placeholder{color:var(--gray-400)}
.field-sm{border:none;border-bottom:1px solid var(--gray-200);color:var(--black);text-align:center;width:36px;font-size:13px;font-family:var(--font);background:transparent;outline:none;padding:2px 0}
.field-amt{border:none;border-bottom:1px solid var(--gray-200);color:var(--black);text-align:right;width:72px;font-size:13px;font-family:var(--font);background:transparent;outline:none;padding:2px 0}
.field-amt::placeholder,.field-sm::placeholder{color:var(--gray-400)}
.btn{background:var(--black);width:100%;color:var(--white);border-radius:var(--radius);font-size:15px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;padding:15px;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-ghost{width:100%;color:var(--gray-400);border:.5px solid var(--gray-200);border-radius:var(--radius);font-size:14px;font-family:var(--font);cursor:pointer;background:transparent;margin-top:8px;padding:13px}
.btn-sm{background:var(--black);color:var(--white);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;border-radius:20px;padding:5px 14px}
.btn-sm-outline{color:var(--gray-600);border:.5px solid var(--gray-200);font-size:12px;font-family:var(--font);cursor:pointer;background:transparent;border-radius:20px;padding:5px 14px}
.toggle-wrap{background:var(--gray-100);border-radius:20px;gap:2px;padding:3px;display:flex}
.toggle-btn{cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font);border:none;border-radius:16px;padding:4px 14px;transition:all .15s}
.toggle-btn.active{background:var(--black);color:var(--white)}
.toggle-btn.inactive{color:var(--gray-400);background:transparent}
.check-on{background:var(--black);cursor:pointer;border-radius:4px;flex-shrink:0;justify-content:center;align-items:center;width:18px;height:18px;display:flex}
.check-off{border:1px solid var(--gray-200);cursor:pointer;border-radius:4px;flex-shrink:0;width:18px;height:18px}
.progress-bar{gap:4px;margin-bottom:24px;display:flex}
.progress-bar span{border-radius:2px;flex:1;height:2px}
.progress-bar span.on{background:var(--black)}
.progress-bar span.off{background:var(--gray-200)}
.bottom-nav{background:var(--white);border-top:.5px solid var(--gray-100);z-index:100;justify-content:space-around;align-items:center;width:100%;max-width:430px;padding:10px 0 20px;display:flex;position:fixed;bottom:0;left:50%;transform:translate(-50%)}
.nav-item{cursor:pointer;flex-direction:column;align-items:center;gap:4px;min-width:52px;display:flex}
.nav-label{color:var(--gray-400);font-size:10px}
.nav-label.active{color:var(--black);font-weight:500}
.nav-plus{background:var(--black);cursor:pointer;border-radius:50%;justify-content:center;align-items:center;width:44px;height:44px;display:flex}
.card{background:var(--gray-50);border-radius:var(--radius);margin-bottom:12px;padding:16px}
.add-row{cursor:pointer;color:var(--gray-400);align-items:center;gap:10px;padding:12px 0;display:flex}
.add-circle{border:1px solid var(--gray-200);width:22px;height:22px;color:var(--gray-400);border-radius:50%;justify-content:center;align-items:center;font-size:14px;display:flex}
.parse-result{flex-wrap:wrap;gap:6px;margin-top:10px;display:flex}
.parse-tag{border:.5px solid var(--gray-200);color:var(--gray-600);border-radius:12px;padding:3px 10px;font-size:11px}
.parse-tag.primary{background:var(--black);color:var(--white);border-color:var(--black)}
.pill-on{background:var(--black);color:var(--white);cursor:pointer;font-size:12px;font-family:var(--font);border:none;border-radius:14px;padding:4px 12px}
.pill-off{color:var(--gray-400);border:.5px solid var(--gray-200);cursor:pointer;font-size:12px;font-family:var(--font);background:transparent;border-radius:14px;padding:4px 12px}
.bar-track{background:var(--gray-100);border-radius:2px;height:3px;margin-top:8px}
.bar-fill{background:var(--black);border-radius:2px;height:100%}
/* 펼침 애니메이션 */
.expand-enter{animation:.2s ease forwards expandIn}
@keyframes expandIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:.25s forwards fadeIn}

/* 업데이트 배너 슬라이드 */
@keyframes bannerIn{
  from{opacity:0;transform:translateY(-10px);max-height:0;margin-bottom:0;padding-top:0;padding-bottom:0}
  to  {opacity:1;transform:translateY(0);max-height:80px;margin-bottom:14px;padding-top:11px;padding-bottom:11px}
}
@keyframes bannerOut{
  from{opacity:1;transform:translateY(0);max-height:80px;margin-bottom:14px;padding-top:11px;padding-bottom:11px}
  to  {opacity:0;transform:translateY(-10px);max-height:0;margin-bottom:0;padding-top:0;padding-bottom:0}
}
.banner-enter{animation:.3s cubic-bezier(.4,0,.2,1) forwards bannerIn;overflow:hidden}
.banner-exit {animation:.25s cubic-bezier(.4,0,.2,1) forwards bannerOut;overflow:hidden;pointer-events:none}

/* ── layout utilities ───────────────────────────────────── */
.flex-row        {display:flex;flex-direction:row}
.flex-col        {display:flex;flex-direction:column}
.flex-center     {display:flex;align-items:center}
.flex-between    {display:flex;justify-content:space-between;align-items:center}
.flex-end        {display:flex;justify-content:flex-end}
.flex-wrap       {flex-wrap:wrap}
.gap-4           {gap:4px}
.gap-6           {gap:6px}
.gap-8           {gap:8px}
.gap-10          {gap:10px}
.gap-12          {gap:12px}
.mb-4            {margin-bottom:4px}
.mb-6            {margin-bottom:6px}
.mb-8            {margin-bottom:8px}
.mb-10           {margin-bottom:10px}
.mb-12           {margin-bottom:12px}
.mb-14           {margin-bottom:14px}
.mb-16           {margin-bottom:16px}
.mb-20           {margin-bottom:20px}
.mb-24           {margin-bottom:24px}
.mb-28           {margin-bottom:28px}
.mt-8            {margin-top:8px}
.mt-12           {margin-top:12px}
.w-full          {width:100%}
.flex-1          {flex:1}
.text-right      {text-align:right}

/* ── text utilities ─────────────────────────────────────── */
.text-11         {font-size:11px}
.text-12         {font-size:12px}
.text-13         {font-size:13px}
.text-14         {font-size:14px}
.fw-500          {font-weight:500}
.color-muted     {color:var(--gray-400)}
.color-mid       {color:var(--gray-600)}
.color-accent    {color:var(--accent)}

/* ── border/divider ─────────────────────────────────────── */
.border-top      {border-top:.5px solid var(--gray-100)}
.border-bottom   {border-bottom:.5px solid var(--gray-100)}
.vdivider        {width:.5px;background:var(--gray-200)}

/* ── card-like panels ───────────────────────────────────── */
.panel           {background:var(--gray-50);border-radius:12px;padding:14px}
.panel-outlined  {border:.5px solid var(--gray-100);border-radius:12px;padding:12px}

/* ── back button ────────────────────────────────────────── */
.btn-back        {background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;color:var(--gray-400);font-size:13px;padding:0;font-family:var(--font)}
.btn-icon        {background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center}

/* ── nav header row ─────────────────────────────────────── */
.page-header     {display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.page-header-lg  {display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}

/* ── inline label ───────────────────────────────────────── */
.field-label     {font-size:11px;color:var(--gray-400);margin-bottom:4px}

/* ── currency toggle (shared pattern) ──────────────────── */
.cur-toggle      {display:flex;align-items:center;gap:8px}

/* ── amount row (symbol + input) ────────────────────────── */
.amt-row         {display:flex;align-items:center;gap:6px}

/* ── auth page ──────────────────────────────────────────── */
.auth-shell{display:flex;flex-direction:column;justify-content:space-between;min-height:100%;padding:60px 28px 48px;background:var(--white)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:40px}
.auth-title{font-size:24px;font-weight:500;line-height:1.3;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--gray-600);margin-bottom:36px;line-height:1.7}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:.5px;background:var(--gray-200)}
.auth-divider span{font-size:11px;color:var(--gray-400)}
.auth-error{font-size:12px;color:#C04B1E;margin-top:8px;min-height:18px}
.auth-switch{font-size:13px;color:var(--gray-400);text-align:center;margin-top:16px}
.auth-switch span{color:var(--black);cursor:pointer;border-bottom:1px solid var(--gray-200)}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;border:.5px solid var(--gray-200);border-radius:var(--radius);background:var(--white);font-size:14px;font-family:var(--font);cursor:pointer;padding:14px;transition:background .15s}
.btn-google:hover{background:var(--gray-50)}
.field-wrap{margin-bottom:14px}
.field-wrap label{display:block;font-size:11px;color:var(--gray-400);margin-bottom:4px}
/* 로딩 스피너 */
#app-loader{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s ease}
#app-loader.hidden{opacity:0;pointer-events:none}
.loader-spinner{width:40px;height:40px;border:3px solid var(--gray-200);border-top-color:var(--black);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--gray-400);font-family:var(--font)}
</style>
</head>

const formatRate = (rate) => {
  const n = Number(rate);
  if (!Number.isFinite(n)) return '0.00';
  return n.toLocaleString('ko-KR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
};


const formatMoney = (value, currency, { withSymbol = true, abs = false, sign = '' } = {}) => {
  const num = Number(value);
  if (!Number.isFinite(num)) return withSymbol ? (currency === 'EUR' ? '€ 0,00' : '₩ 0') : '0';

  const base = abs ? Math.abs(num) : num;
  const formatted = currency === 'EUR'
    ? base.toLocaleString('de-DE', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      })
    : Math.round(base).toLocaleString('en-US', {
        maximumFractionDigits: 0,
      });

  const prefix = sign || '';
  if (!withSymbol) return `${prefix}${formatted}`;

  return currency === 'EUR'
    ? `${prefix}€ ${formatted}`
    : `${prefix}₩ ${formatted}`;
};

const roundRate2 = v => {
  const n = Number(v);
  return Number.isFinite(n) ? Math.round(n * 100) / 100 : 0;
};
const roundEur2 = v => {
  const n = Number(v);
  return Number.isFinite(n) ? Math.round(n * 100) / 100 : 0;
};
const roundKrw0 = v => {
  const n = Number(v);
  return Number.isFinite(n) ? Math.round(n) : 0;
};
const normalizeRate = rate => roundRate2(rate || getRate().rate);
const convertByRate = (amount, fromCurrency, toCurrency, rate) => {
  const a = Number(amount);
  if (!Number.isFinite(a)) return 0;
  if (fromCurrency === toCurrency) return a;
  const r = normalizeRate(rate);
  if (!Number.isFinite(r) || r <= 0) return 0;
  if (fromCurrency === 'EUR' && toCurrency === 'KRW') return roundKrw0(a * r);
  if (fromCurrency === 'KRW' && toCurrency === 'EUR') return roundEur2(a / r);
  return a;
};

// camelCase(앱) ↔ snake_case(DB) 변환 헬퍼
const toSnake = obj => {
  const map = {
    accountId:'account_id', accountName:'account_name',
    fromAccountId:'from_account_id', fromAccountName:'from_account_name',
    fromAmount:'from_amount', fromCurrency:'from_currency',
    toAccountId:'to_account_id', toAccountName:'to_account_name',
    toAmount:'to_amount', toCurrency:'to_currency',
    feeCurrency:'fee_currency', transferId:'transfer_id',
    rateAtTime:'rate_at_time', rateDate:'rate_date',
    payMethod:'pay_method', fixedId:'fixed_id',
    isCorrection:'is_correction', createdAt:'created_at',
    initialBalance:'initial_balance', isCash:'is_cash',
    incomeType:'income_type', startMonth:'start_month',
    syncedMonths:'synced_months', budgetEur:'budget_eur',
    excludeCategories:'exclude_categories', rateUpdatedAt:'rate_updated_at',
    rateDate:'rate_date',
  };
  return Object.fromEntries(
    Object.entries(obj).map(([k, v]) => [map[k] || k, v])
  );
};
const toCamel = obj => {
  const map = {
    account_id:'accountId', account_name:'accountName',
    from_account_id:'fromAccountId', from_account_name:'fromAccountName',
    from_amount:'fromAmount', from_currency:'fromCurrency',
    to_account_id:'toAccountId', to_account_name:'toAccountName',
    to_amount:'toAmount', to_currency:'toCurrency',
    fee_currency:'feeCurrency', transfer_id:'transferId',
    rate_at_time:'rateAtTime', rate_date:'rateDate',
    pay_method:'payMethod', fixed_id:'fixedId',
    is_correction:'isCorrection', created_at:'createdAt',
    initial_balance:'initialBalance', is_cash:'isCash',
    income_type:'incomeType', start_month:'startMonth',
    synced_months:'syncedMonths', budget_eur:'budgetEur',
    exclude_categories:'excludeCategories', rate_updated_at:'rateUpdatedAt',
    user_id:'userId',
  };
  return Object.fromEntries(
    Object.entries(obj)
      .filter(([k]) => k !== 'user_id')   // userId는 앱에서 불필요
      .map(([k, v]) => [map[k] || k, v])
  );
};

const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

const waitForSession = async (timeout = 6000) => {
  const started = Date.now();

  while (Date.now() - started < timeout) {
    const { data, error } = await supabase.auth.getSession();
    if (error) console.error('[AUTH] getSession 오류:', error);

    const session = data?.session;
    if (session?.access_token && session?.user?.id) return session;

    await wait(150);
  }

  throw new Error('세션이 아직 준비되지 않았습니다.');
};

      a?.initialBalance ??
      a?.balance ??

const dbSaveAccounts = async (accounts) => {
  const normalized = normalizeAccounts(accounts);
  setAccounts(normalized);   // localStorage

  const uid = await getCurrentUserId();
  if (!uid) return;

  const { error: delErr } = await supabase.from('accounts').delete().eq('user_id', uid);
  if (delErr) {
    console.error('[DB] accounts 삭제 오류:', delErr);
    return;
  }

  if (normalized.length === 0) return;

  const rows = normalized.map(a => {
    const { balance, initial_balance, ...clean } = a || {};
    return { ...toSnake(clean), user_id: uid };
  });

  log.info('DB', 'accounts rows sample:', rows[0]);

  const { error: insErr } = await supabase.from('accounts').insert(rows);
  if (insErr) log.error('DB', 'accounts 저장 오류:', insErr, '데이터 샘플:', rows[0]);

  ]);

  // DB 데이터를 현재 계정 scope 캐시에 완전 덮어쓰기
  setAccounts(normalizeAccounts((accsRes.data || []).map(toCamel)));
  setTxns((txnsRes.data || []).map(toCamel));
  setFixedExp((fixExpRes.data || []).map(toCamel));

  if (settRes.error) {

  }
  log.info('DB', 'load 완료', {
    accounts: accsRes.data?.length || 0,
    txns: txnsRes.data?.length || 0,
    fixedExp: fixExpRes.data?.length || 0,
    fixedInc: fixIncRes.data?.length || 0,
    hasSettings: !!settRes.data,

    const s = settRes.data;
    if (s.rate)               setRate(roundRate2 ? roundRate2(s.rate) : s.rate, s.rate_date || null);
    if (s.budget_eur !== null || s.exclude_categories)
      ls.set(BASE_KEYS.BUDGET, { eur: s.budget_eur, excludeCategories: s.exclude_categories || ['식비지원금'] });

    if (s.start_month)        ls.set(BASE_KEYS.START_MONTH, s.start_month);
  }
  return true;
};

let isMigratingToDb = false;

// ── localStorage → DB 마이그레이션 (최초 로그인 시) ─────────────
const migrateLocalToDb = async () => {
  if (isMigratingToDb) {
    log.warn('SYNC', 'migrate 스킵 — 이미 실행 중');
    return;
  }
  isMigratingToDb = true;

  try {
    const uid = await getCurrentUserId();
    if (!uid) return;
    // DB에 데이터가 이미 있으면 스킵
    const { data, error } = await supabase.from('accounts').select('id').eq('user_id', uid).limit(1);
    if (error) { log.error('SYNC', 'migrate 체크 오류:', error); return; }
    if (data?.length) { log.info('SYNC', 'migrate 스킵 — 이미 DB에 데이터 있음'); return; }
    // localStorage 데이터가 있으면 DB로 올리기
    const accs   = normalizeAccounts(getAccounts());
    const txns   = getTxns();
    const fixExp = getFixedExp();
    const fixInc = getFixedInc();
    log.group('SYNC', 'migrateLocalToDb');
    log.info('SYNC', 'migrate 시작 — 계좌:', accs.length, '내역:', txns.length);
    if (accs.length || txns.length || fixExp.length || fixInc.length) {
      await Promise.all([
        dbSaveAccounts(accs),
        dbSaveTxns(txns),
        dbSaveFixedExp(fixExp),
        dbSaveFixedInc(fixInc),
        dbSaveSettings(),
      ]);
      log.info('SYNC', 'migrate 완료');
    } else {
      log.info('SYNC', 'migrate 스킵 — localStorage도 비어있음');
    }
  } finally {
    isMigratingToDb = false;
    log.groupEnd();
  }
};

// ─── transaction helpers ──────────────────────────────────────────────────────
const addTxn = entry => {
  const txns = getTxns();
  const t = { ...entry, id: `t_${Date.now()}_${Math.random().toString(36).slice(2)}`, createdAt: new Date().toISOString() };
  // 수수료 자동 생성 (transfer)
  if (t.type === 'transfer' && t.fee && t.fee > 0) {
    const feeEntry = { id: `t_fee_${t.id}`, transferId: t.id, title: `${t.title || '송금'} 수수료`, type: 'expense', amount: t.fee, currency: t.feeCurrency || t.fromCurrency, accountId: t.fromAccountId, accountName: t.fromAccountName || '', category: '송금', payMethod: 'card', memo: '수수료', date: t.date, rateAtTime: t.rateAtTime, rateDate: t.rateDate, createdAt: new Date().toISOString() };
    setTxns([feeEntry, t, ...txns]);
    return t;
  }
  setTxns([t, ...txns]);
  return t;
};
// ─── 수수료 항목 동기화 헬퍼 ─────────────────────────────────────────────────
// transfer 수정 시 수수료 내역(t_fee_*)을 일관되게 업데이트/삭제한다.
const syncFeeEntry = (txns, parentId, patch) => {
  const feeId = `t_fee_${parentId}`;
  const hasFee = txns.some(t => t.id === feeId);
  if (patch.fee > 0) {
    const updated = {
      id: feeId, transferId: parentId,
      title: `${patch.title || '송금'} 수수료`,
      type: 'expense', amount: patch.fee,
      currency: patch.feeCurrency || patch.fromCurrency,
      accountId: patch.fromAccountId, accountName: patch.fromAccountName || '',
      category: '송금', payMethod: 'card', memo: '수수료',
      date: patch.date, rateAtTime: patch.rateAtTime, rateDate: patch.rateDate,
      createdAt: new Date().toISOString(),
    };
    if (hasFee) return txns.map(t => t.id === parentId ? { ...t, ...patch } : t.id === feeId ? updated : t);
    return [updated, ...txns.map(t => t.id === parentId ? { ...t, ...patch } : t)];
  }
  // fee가 0 이하: 기존 수수료 내역 제거
  return txns.filter(t => t.id !== feeId).map(t => t.id === parentId ? { ...t, ...patch } : t);
};

const updateTxn = (id, patch) => {
  const txns = getTxns();
  if (patch.type === 'transfer' && patch.fee !== undefined) {
    setTxns(syncFeeEntry(txns, id, patch));
    return;
  }
  setTxns(txns.map(t => t.id === id ? { ...t, ...patch } : t));
};
const deleteTxn = id => {
  const txns = getTxns();
  // transfer 수수료 내역도 같이 삭제
  setTxns(txns.filter(t => t.id !== id && t.transferId !== id));
};

// ─── 방식 B: 내역 기반 잔액 계산 ─────────────────────────────────────────────
const calcBalance = (accountId, untilDate = null) => {
  const acc = getAccounts().find(a => a.id === accountId);
  if (!acc) return 0;
  const base = acc.initialBalance ?? acc.balance ?? 0;
  const txns = getTxns().filter(t => !untilDate || t.date <= untilDate);
  let delta = 0;
  txns.forEach(t => {
    if (t.type === 'transfer') {
      if (t.fromAccountId === accountId) delta -= (t.fromAmount || 0);
      if (t.toAccountId === accountId) delta += (t.toAmount || 0);
    } else if (t.type === 'income' && t.accountId === accountId) {
      delta += (t.amount || 0);
    } else if (t.type === 'expense' && t.accountId === accountId) {
      delta -= (t.amount || 0);
    }
  });
  return base + delta;
};

const correctBalance = (accountId, newBalance) => {
  const acc = getAccounts().find(a => a.id === accountId);
  if (!acc) return;
  const current = calcBalance(accountId);
  const diff = newBalance - current;
  const entry = {
    id: `correction_${Date.now()}`, title: '잔액 보정',
    type: diff >= 0 ? 'income' : 'expense',
    amount: Math.abs(diff), currency: acc.currency,
    accountId, accountName: acc.name,
    category: '기타', payMethod: 'card', memo: '수동 잔액 보정',
    date: new Date().toISOString().split('T')[0],
    rateAtTime: normalizeRate(getRate().rate), rateDate: new Date().toISOString().split('T')[0],
    createdAt: new Date().toISOString(), isCorrection: true,
  };
  setTxns([entry, ...getTxns()]);
};

    const data = await res.json();
    const rate = roundRate2(data?.rate);

      return rate;
    }
    return roundRate2(getRate().rate);
  } catch (e) {
    log.error('RATE', 'latest fetch 실패:', e);
    return roundRate2(getRate().rate);
  }
};
const fetchRateForDate = async date => {
  try {

    const data = await res.json();
    const rate = roundRate2(data?.rate);
    return { rate: rate || roundRate2(getRate().rate), date };
  } catch (e) {
    log.error('RATE', 'historical fetch 실패:', e);
    return { rate: roundRate2(getRate().rate), date };
  }
};

// ─── fixed cost auto-sync ─────────────────────────────────────────────────────
const shouldApplyFixed = (item, yr, mo) => {
  if (!item.frequency || item.frequency === 'monthly') return true;
  if (item.frequency === 'quarterly') return (mo - (item.startMonth ?? 0) + 12) % 3 === 0;
  if (item.frequency === 'bimonthly') return (mo - (item.startMonth ?? 0) + 12) % 2 === 0;
  if (item.frequency === 'yearly') return mo === (item.startMonth ?? 0);
  return true;
};
const syncFixedCosts = async () => {
  const now = new Date(), yr = now.getFullYear(), mo = now.getMonth();
  const synced = ls.get(BASE_KEYS.SYNCED) || {};
  const currentRate = normalizeRate(getRate().rate);
  const accs = getAccounts();
  let txns = getTxns(), changed = false;

  // 앱 시작월 — 온보딩 완료 시점. 없으면 현재 달로 기록
  const startData = ls.get(BASE_KEYS.START_MONTH) || (() => {
    const d = { year: yr, month: mo };
    ls.set(BASE_KEYS.START_MONTH, d);
    return d;
  })();
  const startYear = startData.year, startMo = startData.month;

  const months = [];
  for (let mi = 0; mi < 13; mi++) {
    let y = yr, m = mo - mi;
    while (m < 0) { m += 12; y--; }
    // 앱 시작월 이전은 건너뜀
    if (y < startYear || (y === startYear && m < startMo)) continue;
    const key = `${y}-${m}`;
    if (!synced[key]) months.push({ y, m, key });
  }
  if (!months.length) return;
  
  // 환율 캐시 (같은 날짜는 한 번만 조회)
  const rateCache = {};
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  
  // 필요한 모든 날짜의 환율을 미리 수집
  const datesToFetch = new Set();
  for (const { y, m } of months) {
    const items = [...getFixedExp(), ...getFixedInc()];
    for (const item of items) {
      if (!shouldApplyFixed(item, y, m)) continue;
      const cid = `fixed_expense_${item.id}_${y}_${m}`;
      const cid2 = `fixed_income_${item.id}_${y}_${m}`;
      if (txns.find(t => t.id === cid || t.id === cid2)) continue;
      
      const dd = Math.min(item.day || 1, new Date(y, m + 1, 0).getDate());
      const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;
      const txnDate = new Date(dateStr);
      
      // 과거/당일 날짜만 수집
      if (txnDate <= today) {
        datesToFetch.add(dateStr);
      }
    }
  }
  
  // 환율 병렬 조회 (최대 5개씩)
  const dateArray = Array.from(datesToFetch);
  const batchSize = 5;
  for (let i = 0; i < dateArray.length; i += batchSize) {
    const batch = dateArray.slice(i, i + batchSize);
    const results = await Promise.all(
      batch.map(async (dateStr) => {
        try {
          const result = await fetchRateForDate(dateStr);
          return { dateStr, result };
        } catch (err) {
          log.warn('SYNC', `${dateStr} 환율 조회 실패:`, err);
          return { dateStr, result: null };
        }
      })
    );
    
    // 캐시에 저장
    results.forEach(({ dateStr, result }) => {
      if (result && result.rate) {
        rateCache[dateStr] = result;
      }
    });
  }
  
  for (const { y, m, key } of months) {
    const applyItems = (items, type) => {
      items.forEach(item => {
        if (!shouldApplyFixed(item, y, m)) return;
        const cid = `fixed_${type}_${item.id}_${y}_${m}`;
        if (txns.find(t => t.id === cid)) return;
        
        const acc = accs.find(a => a.id === item.accountId) || accs.find(a => item.currency === 'KRW' ? a.currency === 'KRW' : a.currency === 'EUR');
        const dd = Math.min(item.day || 1, new Date(y, m + 1, 0).getDate());
        const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;
        
        // 캐시에서 환율 가져오기
        let rate = currentRate;
        let rateDate = dateStr;
        
        const txnDate = new Date(dateStr);
        
        // 과거 또는 당일 내역: 캐시된 환율 사용
        if (txnDate <= today && rateCache[dateStr]) {
          rate = rateCache[dateStr].rate;
          rateDate = rateCache[dateStr].date || dateStr;
        }
        // 미래 내역: 현재 환율 사용 (예측치)
        
        txns = [{ 
          id: cid, 
          fixedId: item.id, 
          title: item.name + (item.label ? ` (${item.label})` : ''),
          type, 
          amount: item.amount, 
          currency: item.currency || 'EUR', 
          rateAtTime: rate, 
          rateDate: rateDate,
          accountId: acc?.id || '', 
          accountName: acc?.name || '',
          category: type === 'income' ? '급여' : (item.category || '공과금'), 
          payMethod: 'card',
          memo: `고정 ${type === 'income' ? '수입' : '지출'}`, 
          date: dateStr,
          createdAt: new Date().toISOString() 
        }, ...txns];
        changed = true;
      });
    };
    
    applyItems(getFixedExp(), 'expense');
    applyItems(getFixedInc(), 'income');
    synced[key] = true;
  }
  
  if (changed) setTxns(txns);
  ls.set(BASE_KEYS.SYNCED, synced);
  
  // 미래 고정비의 환율 업데이트 체크
  await updateFixedCostsRates();
};

// 미래 고정비가 당일이 되었을 때 환율 업데이트
const updateFixedCostsRates = async () => {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayStr = today.toISOString().split('T')[0];
  
  let txns = getTxns();
  
  // 업데이트가 필요한 고정비 찾기
  const needsUpdate = txns.filter(txn => 
    txn.fixedId && txn.date === todayStr && txn.rateDate !== todayStr
  );
  
  if (needsUpdate.length === 0) return;
  
  // 오늘 환율 한 번만 조회
  try {
    const historicalRate = await fetchRateForDate(todayStr);
    if (!historicalRate || !historicalRate.rate) return;
    
    // 일괄 업데이트
    txns = txns.map(txn => {
      if (needsUpdate.find(t => t.id === txn.id)) {
        log.info('SYNC', `고정비 환율 업데이트: ${txn.title} - ${txn.date}`);
        return {
          ...txn,
          rateAtTime: historicalRate.rate,
          rateDate: historicalRate.date || todayStr
        };
      }
      return txn;
    });
    
    setTxns(txns);
    await dbSaveTxns(txns);
    
  } catch (err) {
    log.warn('SYNC', `오늘(${todayStr}) 환율 업데이트 실패:`, err);
  }
};

      if (data.fixedExp)     setFixedExp(data.fixedExp);
      if (data.fixedInc)     setFixedInc(data.fixedInc);
      if (data.transactions) setTxns(data.transactions);
      if (data.categories)   setCategories(data.categories);
      if (data.budget)       setBudget(data.budget);
      if (data.startMonth)   ls.set(BASE_KEYS.START_MONTH, data.startMonth);

      let loggedIn = false;

        await waitForSession();
        loggedIn = true;
      } catch (authErr) {
        console.warn('[IMPORT] 세션 준비 전이라 DB 동기화는 건너뜀:', authErr);
      }

      if (loggedIn) {
        await dbSaveAccounts(normalizeAccounts(data.accounts || []));
        await dbSaveTxns(data.transactions || []);
        await dbSaveFixedExp(data.fixedExp || []);
        await dbSaveFixedInc(data.fixedInc || []);
        await dbSaveSettings();
      }

      alert(loggedIn
        ? '데이터를 성공적으로 가져왔어요. 앱을 새로고침할게요.'

      alert('파일을 읽거나 동기화하는 중 오류가 발생했어요.');
    }
  };

  reader.readAsText(file);

// 자연어 날짜 표현 → YYYY-MM-DD 변환 (한국어 기준)
// 예: '어제', '3일 전', '지난주 월요일', '4/12', '4월 12일'
const parseRelativeDate = (text) => {
  const today = new Date();
  const t = text;
  const isoOf = d => d.toISOString().split('T')[0];
  const shift = n => { const d = new Date(today); d.setDate(d.getDate() + n); return isoOf(d); };

  if (/어제/.test(t)) return shift(-1);
  if (/그저께|그제/.test(t)) return shift(-2);

  const daysAgo = t.match(/(\d+)일\s*전/);
  if (daysAgo) return shift(-parseInt(daysAgo[1]));

  const DAY_MAP = { '일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6 };

  const lastWeekDay = t.match(/지난\s*주?\s*(월|화|수|목|금|토|일)요일/);
  if (lastWeekDay) {
    const target = DAY_MAP[lastWeekDay[1]];
    const dayDiff = (today.getDay() - target + 7) % 7;
    return shift(-(dayDiff === 0 ? 7 : dayDiff) - 7);
  }

  const thisWeekDay = t.match(/이번\s*주?\s*(월|화|수|목|금|토|일)요일/);
  if (thisWeekDay) {
    const target = DAY_MAP[thisWeekDay[1]];
    return shift(-((today.getDay() - target + 7) % 7));
  }

  const yr = today.getFullYear();
  const mdSlash = t.match(/(\d{1,2})\/(\d{1,2})/);
  if (mdSlash) return `${yr}-${String(mdSlash[1]).padStart(2,'0')}-${String(mdSlash[2]).padStart(2,'0')}`;
  const mdKor = t.match(/(\d{1,2})월\s*(\d{1,2})일/);
  if (mdKor) return `${yr}-${String(mdKor[1]).padStart(2,'0')}-${String(mdKor[2]).padStart(2,'0')}`;

  return null; // 날짜 표현 없음 → 오늘
};

// ─── utils ────────────────────────────────────────────────────────────────────
// 천단위 콤마 포맷팅 유틸
const fmtComma = (val, currency = 'EUR') => {
  let raw = String(val ?? '').trim();
  if (!raw) return '';
  if (currency === 'EUR') {
    raw = raw.replace(/\s+/g, '').replace(/€/g, '').replace(/eur/ig, '');
    const commaCount = (raw.match(/,/g) || []).length;
    const dotCount = (raw.match(/\./g) || []).length;

    let normalized = raw;
    if (commaCount > 0 && dotCount > 0) {
      normalized = raw.replace(/\./g, '').replace(',', '.');
    } else if (commaCount > 0) {
      normalized = raw.replace(/\./g, '').replace(',', '.');
    } else if (dotCount > 0) {
      if (dotCount === 1 && /^-?\d+\.\d{1,2}$/.test(raw)) {
        normalized = raw;
      } else {
        normalized = raw.replace(/\./g, '');
      }
    }

    normalized = normalized.replace(/[^\d.-]/g, '');
    const sign = normalized.startsWith('-') ? '-' : '';
    normalized = normalized.replace(/-/g, '');
    const [intPartRaw = '', decPartRaw = ''] = normalized.split('.');
    const intDigits = intPartRaw.replace(/\D/g, '');
    const intPart = (intDigits || '0').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    const decPart = decPartRaw.replace(/\D/g, '').slice(0, 2);
    return decPartRaw !== '' || normalized.endsWith('.') ? `${sign}${intPart},${decPart}` : `${sign}${intPart}`;
  }
  raw = raw.replace(/[^\d]/g, '');
  return raw.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
};
const parseComma = (val, currency = 'EUR') => {
  const raw = String(val ?? '').trim();
  if (!raw) return 0;
  // KRW: 콤마는 천단위 구분자 → 그냥 제거
  if (currency === 'KRW') {
    return parseFloat(raw.replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0;
  }
  // EUR: 독일식 포맷 (점=천단위, 콤마=소수점)
  if (raw.includes(',')) {
    return parseFloat(raw.replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, '')) || 0;
  }
  if (raw.includes('.')) {
    if (/^-?\d+\.\d{1,2}$/.test(raw)) return parseFloat(raw) || 0;
    return parseFloat(raw.replace(/\./g, '').replace(/[^\d.-]/g, '')) || 0;
  }
  return parseFloat(raw.replace(/,/g, '')) || 0;
};

const KOR_NUM_MAP = {
  '영':0,'공':0,'일':1,'이':2,'삼':3,'사':4,'오':5,'육':6,'칠':7,'팔':8,'구':9
};

const EN_NUM_MAP = {
  zero:0, one:1, two:2, three:3, four:4, five:5, six:6, seven:7, eight:8, nine:9,
  ten:10, eleven:11, twelve:12, thirteen:13, fourteen:14, fifteen:15, sixteen:16, seventeen:17, eighteen:18, nineteen:19,
  twenty:20, thirty:30, forty:40, fifty:50, sixty:60, seventy:70, eighty:80, ninety:90
};

const DE_NUM_MAP = {
  null:0, eins:1, ein:1, eine:1, zwei:2, drei:3, vier:4, funf:5, fuenf:5, fünf:5, sechs:6, sieben:7, acht:8, neun:9,
  zehn:10, elf:11, zwoelf:12, zwölf:12, dreizehn:13, vierzehn:14, funfzehn:15, fuenfzehn:15, fünfzehn:15,
  sechzehn:16, siebzehn:17, achtzehn:18, neunzehn:19,
  zwanzig:20, dreissig:30, dreißig:30, vierzig:40, funfzig:50, fuenfzig:50, fünfzig:50,
  sechzig:60, siebzig:70, achtzig:80, neunzig:90
};

const normalizeLatinText = (text = '') =>
  String(text)
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/ß/g, 'ss')
    .replace(/[^a-z0-9\s-]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();

const parseKoreanNumberText = (text = '') => {
  const src = String(text).trim();
  if (!src) return null;
  if (/^\d+$/.test(src)) return Number(src);

  let total = 0;
  let current = 0;
  let digit = null;

  for (const ch of src) {
    if (KOR_NUM_MAP[ch] !== undefined) {
      digit = KOR_NUM_MAP[ch];
      continue;
    }
    if (ch === '십') {
      current += (digit ?? 1) * 10;
      digit = null;
      continue;
    }
    if (ch === '백') {
      current += (digit ?? 1) * 100;
      digit = null;
      continue;
    }
    if (ch === '천') {
      current += (digit ?? 1) * 1000;
      digit = null;
      continue;
    }
    if (ch === '만') {
      current = (current + (digit ?? 0) || 1) * 10000;
      total += current;
      current = 0;
      digit = null;
      continue;
    }
    return null;
  }

  current += digit ?? 0;
  const out = total + current;
  return Number.isFinite(out) && out >= 0 ? out : null;
};

const parseEnglishNumberText = (text = '') => {
  const src = normalizeLatinText(text);
  if (!src) return null;
  if (/^\d+$/.test(src)) return Number(src);

  const tokens = src.replace(/-/g, ' ').split(/\s+/).filter(Boolean);
  let total = 0;
  let current = 0;

  for (const token of tokens) {
    if (token === 'and') continue;
    if (EN_NUM_MAP[token] != null) {
      current += EN_NUM_MAP[token];
      continue;
    }
    if (token === 'hundred') {
      current = (current || 1) * 100;
      continue;
    }
    if (token === 'thousand') {
      total += (current || 1) * 1000;
      current = 0;
      continue;
    }
    return null;
  }

  const out = total + current;
  return Number.isFinite(out) && out >= 0 ? out : null;
};

const parseGermanNumberToken = token => {
  const t = normalizeLatinText(token).replace(/\s+/g, '');
  if (!t) return null;
  if (/^\d+$/.test(t)) return Number(t);
  if (DE_NUM_MAP[t] != null) return DE_NUM_MAP[t];

  const undMatch = t.match(/^(ein|eins|zwei|drei|vier|funf|fuenf|sechs|sieben|acht|neun)und(zwanzig|dreissig|vierzig|funfzig|fuenfzig|sechzig|siebzig|achtzig|neunzig)$/);
  if (undMatch) {
    const units = DE_NUM_MAP[undMatch[1]];
    const tens = DE_NUM_MAP[undMatch[2]];
    if (units != null && tens != null) return units + tens;
  }

  const hundredMatch = t.match(/^(.*?)(hundert)(.*)$/);
  if (hundredMatch) {
    const left = hundredMatch[1] ? parseGermanNumberToken(hundredMatch[1]) : 1;
    const right = hundredMatch[3] ? parseGermanNumberToken(hundredMatch[3]) : 0;
    if (left != null && right != null) return left * 100 + right;
  }

  const thousandMatch = t.match(/^(.*?)(tausend)(.*)$/);
  if (thousandMatch) {
    const left = thousandMatch[1] ? parseGermanNumberToken(thousandMatch[1]) : 1;
    const right = thousandMatch[3] ? parseGermanNumberToken(thousandMatch[3]) : 0;
    if (left != null && right != null) return left * 1000 + right;
  }

  return null;
};

const parseGermanNumberText = (text = '') => {
  const src = normalizeLatinText(text);
  if (!src) return null;
  if (/^\d+$/.test(src)) return Number(src);

  const tokens = src.split(/\s+/).filter(Boolean);
  if (tokens.length === 1) return parseGermanNumberToken(tokens[0]);

  let total = 0;
  for (const token of tokens) {
    const value = parseGermanNumberToken(token);
    if (value == null) return null;
    total += value;
  }
  return Number.isFinite(total) && total >= 0 ? total : null;
};

const parseMinorUnit = (raw, lang = 'generic') => {
  if (raw == null) return null;
  if (typeof raw === 'number') return raw;
  const text = String(raw).trim();
  if (!text) return null;
  if (/^\d+$/.test(text)) return Number(text);

  const parsers = lang === 'ko'
    ? [parseKoreanNumberText]
    : lang === 'en'
    ? [parseEnglishNumberText]
    : lang === 'de'
    ? [parseGermanNumberText]
    : [parseKoreanNumberText, parseEnglishNumberText, parseGermanNumberText];

  for (const fn of parsers) {
    const v = fn(text);
    if (v != null) return v;
  }
  return null;
};

const extractAmountFromText = (text = '', fallbackCurrency = 'EUR', options = {}) => {
  const src = String(text);
  const debug = !!options?.debug;
  const steps = [];
  const record = (rule, matched, detail = '') => {
    if (debug) steps.push({ rule, matched, detail });
  };
  const resultOf = (amount, currency, hasMinorUnit, rule, detail = '') => {
    const result = { amount, currency, hasMinorUnit };
    if (debug) result.debug = { matchedRule: rule, detail, steps };
    return result;
  };
  const buildEurAmount = (major, minor = 0, rule = 'eur-composite') => {
    if (major == null || minor == null) {
      record(rule, false, `major=${major}, minor=${minor}`);
      return null;
    }
    const minorInt = Number(minor);
    if (!Number.isFinite(minorInt) || minorInt < 0 || minorInt >= 100) {
      record(rule, false, `invalid minor=${minor}`);
      return null;
    }
    record(rule, true, `major=${major}, minor=${minorInt}, amount=${major + minorInt / 100}`);
    return resultOf(major + minorInt / 100, 'EUR', true, rule, `major=${major}, minor=${minorInt}`);
  };

  const tryBuild = (match, rule, majorRaw, minorRaw, majorLang = 'generic', minorLang = majorLang) => {
    if (!match) {
      record(rule, false);
      return null;
    }
    const major = typeof majorRaw === 'function' ? majorRaw(match) : parseMinorUnit(match[majorRaw], majorLang);
    const minor = typeof minorRaw === 'function' ? minorRaw(match) : parseMinorUnit(match[minorRaw], minorLang);
    const built = buildEurAmount(major, minor, rule);
    if (!built) record(rule, false, `majorRaw=${JSON.stringify(match[majorRaw])}, minorRaw=${JSON.stringify(match[minorRaw])}`);
    return built;
  };

  const eurCompositeDigit = src.match(/(\d[\d.,]*)\s*(?:유로|€|eur|euro|euros)\s*(\d{1,2})\s*(?:센트|cent|cents)(?=\s|$|[.,!?])/i);
  {
    const built = tryBuild(eurCompositeDigit, 'eurCompositeDigit', 1, 2, 'generic', 'generic');
    if (built) return built;
  }

  const eurCompositeKo = src.match(/([영공일이삼사오육칠팔구십백천만\d]+)\s*유로\s*([영공일이삼사오육칠팔구십백천만\d]+)\s*센트(?=\s|$|[.,!?])/);
  {
    const built = tryBuild(eurCompositeKo, 'eurCompositeKo', 1, 2, 'ko', 'ko');
    if (built) return built;
  }

  const eurCompositeEn = src.match(/([a-z0-9\s-]+?)\s*(?:euro|euros|eur|€)\s+([a-z0-9\s-]+?)\s*(?:cent|cents)\b/i);
  {
    const built = tryBuild(eurCompositeEn, 'eurCompositeEn', 1, 2, 'en', 'en');
    if (built) return built;
  }

  const eurCompositeDe = src.match(/([a-zA-ZäöüÄÖÜß0-9\s-]+?)\s*(?:euro|eur|€)\s+([a-zA-ZäöüÄÖÜß0-9\s-]+?)\s*(?:cent)\b/i);
  {
    const built = tryBuild(eurCompositeDe, 'eurCompositeDe', 1, 2, 'de', 'de');
    if (built) return built;
  }

  const eurImplicitDigit = src.match(/(\d[\d.,]*)\s*(?:유로|€|eur|euro|euros)\s*(\d{1,2})(?!\s*(?:원|krw|₩|won|유로|€|eur|euro|euros|센트|cent|cents|개|명|병|잔|시|분))(?=\s|$|[.,!?])/i);
  {
    const built = tryBuild(eurImplicitDigit, 'eurImplicitDigit', 1, 2, 'generic', 'generic');
    if (built) return built;
  }

  const eurImplicitKo = src.match(/([영공일이삼사오육칠팔구십백천만\d]+)\s*유로\s*([영공일이삼사오육칠팔구십백천만\d]+)(?!\s*(?:원|유로|센트|개|명|병|잔|시|분))(?=\s|$|[.,!?])/);
  {
    const built = tryBuild(eurImplicitKo, 'eurImplicitKo', 1, 2, 'ko', 'ko');
    if (built) return built;
  }

  const eurImplicitEn = src.match(/([a-z0-9\s-]+?)\s*(?:euro|euros|eur|€)\s+([a-z0-9-]{1,20})(?!\s*(?:won|krw|eur|euro|euros|cent|cents))\b/i);
  {
    const built = tryBuild(eurImplicitEn, 'eurImplicitEn', 1, 2, 'en', 'en');
    if (built) return built;
  }

  const eurImplicitDe = src.match(/([a-zA-ZäöüÄÖÜß0-9\s-]+?)\s*(?:euro|eur|€)\s+([a-zA-ZäöüÄÖÜß0-9-]{1,20})(?!\s*(?:won|krw|eur|euro|euros|cent))\b/i);
  {
    const built = tryBuild(eurImplicitDe, 'eurImplicitDe', 1, 2, 'de', 'de');
    if (built) return built;
  }

  const digitWithCurrency =
    src.match(/(\d[\d.,]*)\s*(유로|€|eur|euro|euros|원|krw|₩|won)/i) ||
    src.match(/(유로|€|eur|euro|euros|원|krw|₩|won)\s*(\d[\d.,]*)/i);

  if (digitWithCurrency) {
    const raw = digitWithCurrency[1] && /\d/.test(digitWithCurrency[1]) ? digitWithCurrency[1] : digitWithCurrency[2];
    const unit = digitWithCurrency[0];
    const currency = /(유로|€|eur|euro|euros)/i.test(unit) ? 'EUR' : 'KRW';
    const amount = parseComma(raw, currency);
    record('digitWithCurrency', true, `raw=${raw}, currency=${currency}, amount=${amount}`);
    return resultOf(amount, currency, false, 'digitWithCurrency', `raw=${raw}, unit=${unit}`);
  }
  record('digitWithCurrency', false);

  const manWon = src.match(/(\d[\d,]*)\s*만\s*원/);
  if (manWon) {
    const amount = Number(String(manWon[1]).replace(/,/g, '')) * 10000;
    record('manWon', true, `raw=${manWon[1]}, amount=${amount}`);
    return resultOf(amount, 'KRW', false, 'manWon', `raw=${manWon[1]}`);
  }
  record('manWon', false);

  const koreanAmount = src.match(/([영공일이삼사오육칠팔구십백천만]+)\s*(유로|원)/);
  if (koreanAmount) {
    const amount = parseKoreanNumberText(koreanAmount[1]);
    const currency = koreanAmount[2] === '유로' ? 'EUR' : 'KRW';
    if (amount != null) {
      record('koreanAmount', true, `raw=${koreanAmount[1]}, currency=${currency}, amount=${amount}`);
      return resultOf(amount, currency, false, 'koreanAmount', `raw=${koreanAmount[1]}`);
    }
  }
  record('koreanAmount', false);

  const englishAmount = src.match(/([a-z\s-]+)\s*(euro|euros|won)\b/i);
  if (englishAmount) {
    const amount = parseEnglishNumberText(englishAmount[1]);
    const currency = /euro/i.test(englishAmount[2]) ? 'EUR' : 'KRW';
    if (amount != null) {
      record('englishAmount', true, `raw=${englishAmount[1]}, currency=${currency}, amount=${amount}`);
      return resultOf(amount, currency, false, 'englishAmount', `raw=${englishAmount[1]}`);
    }
  }
  record('englishAmount', false);

  const germanAmount = src.match(/([a-zA-ZäöüÄÖÜß\s-]+)\s*(euro)\b/i);
  if (germanAmount) {
    const amount = parseGermanNumberText(germanAmount[1]);
    if (amount != null) {
      record('germanAmount', true, `raw=${germanAmount[1]}, amount=${amount}`);
      return resultOf(amount, 'EUR', false, 'germanAmount', `raw=${germanAmount[1]}`);
    }
  }
  record('germanAmount', false);

  const digitOnly = src.match(/(\d[\d.,]*)/);
  if (digitOnly) {
    const amount = parseComma(digitOnly[1], fallbackCurrency);
    record('digitOnly', true, `raw=${digitOnly[1]}, amount=${amount}, fallbackCurrency=${fallbackCurrency}`);
    return resultOf(amount, fallbackCurrency, false, 'digitOnly', `raw=${digitOnly[1]}`);
  }
  record('digitOnly', false);

  record('fallbackNull', true, `fallbackCurrency=${fallbackCurrency}`);
  return resultOf(null, fallbackCurrency, false, 'fallbackNull', 'no numeric amount found');
};

const explainAmountParse = (text = '', fallbackCurrency = 'EUR') => {
  const parsed = extractAmountFromText(text, fallbackCurrency, { debug: true });
  const debug = parsed?.debug || {};
  return {
    input: String(text ?? ''),
    amount: parsed?.amount ?? null,
    currency: parsed?.currency || fallbackCurrency,
    hasMinorUnit: !!parsed?.hasMinorUnit,
    matchedRule: debug.matchedRule || 'unknown',
    detail: debug.detail || '',
    formatted: parsed?.amount != null ? formatMoney(parsed.amount, parsed.currency || fallbackCurrency, { withSymbol: false }) : 'FAIL',
    steps: debug.steps || [],
  };
};

// 입력 중 포맷은 유지하되, 저장값은 기존처럼 parseComma(...)가 숫자로 해석하도록 문자열만 관리
const makeAmountHandler = (currency, onChange) => e => {
  const input = String(e.target.value ?? '');

  if (currency === 'EUR') {
    const cleaned = input.replace(/[€\s]/g, '');
    const hasComma = cleaned.includes(',');
    const noDots = cleaned.replace(/\./g, '');
    const parts = noDots.split(',');

    const intDigits = (parts[0] || '').replace(/\D/g, '');
    const decDigits = parts.slice(1).join('').replace(/\D/g, '').slice(0, 2);

    const intFormatted = intDigits.replace(/^0+(?=\d)/, '').replace(/\B(?=(\d{3})+(?!\d))/g, '.');

    if (hasComma) {
      onChange(`${intFormatted || '0'},${decDigits}`);
    } else {
      onChange(intFormatted);
    }
    return;
  }

  const digits = input.replace(/\D/g, '');
  onChange(digits.replace(/\B(?=(\d{3})+(?!\d))/g, ','));
};

  // ── 계좌 관련 상태 ────────────────────────────────────────────────────────

  // ── 고정 지출 관련 상태 ───────────────────────────────────────────────────

  const buildAccounts = () => {
    const { krName, krBal, deName, deBal, eurCash, krwCash } = accounts;
    const result = [];
    if (krName.trim()) result.push({ id: 'kr-main', name: krName.trim(), country: 'KR', currency: 'KRW', initialBalance: parseComma(krBal, 'KRW') });
    if (deName.trim()) result.push({ id: 'de-main', name: deName.trim(), country: 'DE', currency: 'EUR', initialBalance: parseComma(deBal, 'EUR') });
    extraAccs.forEach(a => result.push({ id: a.id, name: a.name, country: a.country, currency: a.country === 'KR' ? 'KRW' : 'EUR', initialBalance: parseComma(a.balance, a.country === 'KR' ? 'KRW' : 'EUR') }));
    if (parseComma(eurCash, 'EUR') > 0) result.push({ id: 'cash-eur', name: '현금 (EUR)', country: 'DE', currency: 'EUR', initialBalance: parseComma(eurCash, 'EUR'), isCash: true });
    if (parseComma(krwCash, 'KRW') > 0) result.push({ id: 'cash-krw', name: '현금 (KRW)', country: 'KR', currency: 'KRW', initialBalance: parseComma(krwCash, 'KRW'), isCash: true });
    return result;
  };

  const addExtra = () => {
    const nm = extraNameRef.current?.value;
    if (!nm?.trim()) return;
    const balRaw = extraBalRef.current?.value || '0';
    const balNorm = balRaw.replace(/\.(?=\d{3})/g, '').replace(/,(\d{1,2})$/, '.$1').replace(/,/g, '');
    const bal = parseFloat(balNorm) || 0;
    setExtraAccs(prev => [...prev, { id: Date.now().toString(), name: nm.trim(), balance: bal, country: accounts.extraCountry }]);
    if (extraNameRef.current) extraNameRef.current.value = '';
    if (extraBalRef.current) extraBalRef.current.value = '';
  };

  const addFixedExpExtra = () => {
    const nm = feNameRef.current?.value;
    if (!nm?.trim()) return;
    const amt = feAmtRef.current?.value, day = feDayRef.current?.value;
    setFixedExpExtra(prev => [...prev, { id: Date.now().toString(), name: nm, amount: amt, day, currency: feForm.cur, frequency: feForm.freq, accountId: feForm.accId }]);
    if (feNameRef.current) feNameRef.current.value = '';
    if (feAmtRef.current) feAmtRef.current.value = '';
    if (feDayRef.current) feDayRef.current.value = '';
  };

  const addFixedInc = () => {
    const nm = fiNameRef.current?.value;
    if (!nm?.trim()) return;
    const amt = fiAmtRef.current?.value, day = fiDayRef.current?.value;

      id: Date.now().toString(), name: nm, amount: amt, day,
      currency: fiForm.cur, frequency: fiForm.freq,
      accountId: fiForm.type === 'account' ? fiForm.accId : '',

  const finish = async () => {
    await fetchLatestRate();
    const accs = buildAccounts();
    const deMain = accs.find(a => a.country === 'DE' && !a.isCash);

      ? [{ id: Date.now().toString() + '_pending_inc', name: fiNameRef.current.value.trim(), amount: fiAmtRef.current?.value || 0, day: fiDayRef.current?.value || 1, currency: fiForm.cur, frequency: fiForm.freq, accountId: fiForm.type === 'account' ? (fiForm.accId || '') : '', incomeType: fiForm.type }]

    setAccounts(accs);
    setFixedExp(finalFixedExp);
    setFixedInc(finalFixedInc);
    syncFixedCosts(); // 비동기 실행 (기다리지 않음)

    ] }),

      jsxs('p', { style: { fontSize: 13, color: 'var(--gray-600)', lineHeight: 1.9 }, children: ['KRW · EUR 동시 관리', jsx('br',{}), '송금 내역 · 고정비 · 자연어 입력'] }),
    ] }),
    jsxs('div', { children: [
      jsx('button', { className: 'btn', onClick: () => setStep(1), children: hideAuthEntry ? '계좌 등록 시작' : '시작하기' }),
      !hideAuthEntry && jsx('button', { className: 'btn-ghost', onClick: onLogin, children: '로그인 / 회원가입' }),
      jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', textAlign: 'center', marginTop: 12, lineHeight: 1.7 }, children: hideAuthEntry ? '현재 계정에는 아직 가계부 데이터가 없어요' : '로그인 없이도 바로 사용할 수 있어요' }),

// ─── ADD / EDIT TRANSACTION ───────────────────────────────────────────────────
function AddTransaction({ onDone, editing = null }) {
  const accounts = getAccounts();
  const [cats, setCats] = useState(getCategories());
  const [addCat, setAddCat] = useState(false);
  const [showDetail, setShowDetail] = useState(false);
  const newCatRef = useRef();
  const [mode, setMode] = useState(editing ? 'manual' : 'ai');
  const [aiText, setAiText] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiResult, setAiResult] = useState(null);
  const [aiErr, setAiErr] = useState('');
  const [testInput, setTestInput] = useState('');
  const [testResult, setTestResult] = useState('');
  const [testDebug, setTestDebug] = useState(null);
  const f = editing || {};
  const [type, setType] = useState(f.type || 'expense');
  const [cur, setCur] = useState(f.currency || 'EUR');
  const [amtStr, setAmtStr] = useState(f.amount ? fmtComma(String(f.currency === 'EUR' ? f.amount : Math.round(f.amount))) : '');
  const [accId, setAccId] = useState(f.accountId || accounts[0]?.id || '');
  const [cat, setCat] = useState(f.category || '식비');
  const [payMethod, setPayMethod] = useState(f.payMethod || 'card');
  const [titleVal, setTitleVal] = useState(f.title || '');
  const memoRef = useRef();
  const [date, setDate] = useState(f.date || new Date().toISOString().split('T')[0]);
  const [rateInfo, setRateInfo] = useState(f.rateAtTime ? { rate: f.rateAtTime, date: f.rateDate } : null);
  const [rateLoading, setRateLoading] = useState(false);
  const [manualRate, setManualRate] = useState(false);
  const [manualRateVal, setManualRateVal] = useState('');
  // 송금 전용 state
  const [fromAccId, setFromAccId] = useState(f.fromAccountId || accounts.find(a => a.country === 'DE')?.id || accounts[0]?.id || '');
  const [fromAmtStr, setFromAmtStr] = useState(f.fromAmount ? fmtComma(String(f.fromCurrency === 'EUR' ? f.fromAmount : Math.round(f.fromAmount))) : '');
  const [fromCur, setFromCur] = useState(f.fromCurrency || 'EUR');
  const [toAccId, setToAccId] = useState(f.toAccountId || accounts.find(a => a.country === 'KR')?.id || '');
  const [toAmtStr, setToAmtStr] = useState(f.toAmount ? fmtComma(String(f.toCurrency === 'EUR' ? f.toAmount : Math.round(f.toAmount))) : '');
  const [toCur, setToCur] = useState(f.toCurrency || 'KRW');
  const [feeStr, setFeeStr] = useState(f.fee ? String(f.fee) : '');
  const [feeCur, setFeeCur] = useState(f.feeCurrency || 'EUR');
  
  // 영수증 스캔 관련
  const [receiptScanning, setReceiptScanning] = useState(false);
  const [receiptResult, setReceiptResult] = useState(null);
  const fileInputRef = useRef();

  useEffect(() => {
    if (!editing) { setRateLoading(true); fetchRateForDate(date).then(r => { setRateInfo(r); setRateLoading(false); }); }
  }, [date]);

  const isVoucher = payMethod === 'voucher' || VOUCHER_CATS.includes(cat);
  const effectiveRate = normalizeRate(manualRate && manualRateVal ? parseFloat(manualRateVal) : rateInfo?.rate || getRate().rate);

  const runAI = async () => {
    if (!aiText.trim()) return;
    setAiLoading(true); setAiErr('');
    try {
      const res = await fetch('/money/api/parse', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: aiText }) });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      const parsed = data.result || {};
      const fallback = extractAmountFromText(aiText, parsed.currency || 'EUR');
      const hasParsedAmount = Number.isFinite(Number(parsed.amount));
      const parsedAmount = fallback.hasMinorUnit
        ? fallback.amount
        : (hasParsedAmount ? Number(parsed.amount) : fallback.amount);
      const parsedCurrency = parsed.currency || fallback.currency || 'EUR';

      setAiResult(parsed);
      setType(parsed.type || 'expense');
      setCur(parsedCurrency);
      setAmtStr(
        parsedAmount != null
          ? fmtComma(String(parsedCurrency === 'EUR' ? parsedAmount : Math.round(parsedAmount)), parsedCurrency)
          : ''
      );
      setPayMethod(parsed.payMethod || 'card');
      // title — state로 안정적으로 반영
      setTitleVal(parsed.title || '');
      // category — 앱 카테고리 목록에 없으면 기타로 fallback
      const validCats = getCategories();
      setCat(validCats.includes(parsed.category) ? parsed.category : '기타');
      // date — 자연어에서 날짜 표현 추출
      const parsedDate = parseRelativeDate(aiText);
      if (parsedDate) { setDate(parsedDate); }
      // account — 국가 기준으로 자동 선택
      const acc = accounts.find(a => parsed.country === 'KR' ? a.country === 'KR' : a.country === 'DE');
      if (acc) setAccId(acc.id);
    } catch { setAiErr('파싱 실패. 직접 입력해주세요.'); }
    setAiLoading(false);
  };

  // 영수증 스캔 처리
  const handleReceiptScan = async (file) => {
    if (!file) return;
    
    setReceiptScanning(true);
    setReceiptResult(null);
    
    try {
      // 이미지를 base64로 변환
      const base64Data = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = () => reject(new Error('파일 읽기 실패'));
        reader.readAsDataURL(file);
      });
      
      // 서버 API로 영수증 분석 요청
      const response = await fetch('/money/api/receipt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: base64Data,
          mimeType: file.type
        })
      });
      
      const data = await response.json();
      
      if (!data.ok) {
        throw new Error(data.error || '영수증 분석 실패');
      }
      
      const result = data.result;
      
      // 결제수단 매핑
      const paymentMethodMap = {
        'debit': 'card',
        'credit': 'creditcard',
        'cash': 'cash'
      };
      
      setReceiptResult({
        ...result,
        paymentMethod: result.paymentMethod ? paymentMethodMap[result.paymentMethod] || 'card' : null
      });
      
    } catch (err) {
      console.error('영수증 스캔 오류:', err);
      alert('영수증을 인식하지 못했어요. 다시 시도해주세요.');
    } finally {
      setReceiptScanning(false);
    }
  };
  
  // 카메라/갤러리
  const handleCameraClick = () => {
    if (fileInputRef.current) {
      fileInputRef.current.accept = 'image/*';
      fileInputRef.current.capture = 'environment';
      fileInputRef.current.click();
    }
  };
  
  const handleGalleryClick = () => {
    if (fileInputRef.current) {
      fileInputRef.current.accept = 'image/*';
      fileInputRef.current.removeAttribute('capture');
      fileInputRef.current.click();
    }
  };
  
  // 영수증 결과 적용
  const applyReceiptResult = (saveType) => {
    if (!receiptResult) return;
    
    const { storeName, date: receiptDate, totalAmount, currency, items, category, paymentMethod } = receiptResult;
    
    // 합계만 저장
    setType('expense');
    setCur(currency || 'EUR');
    setAmtStr(fmtComma(String(currency === 'EUR' ? totalAmount : Math.round(totalAmount)), currency));
    setTitleVal(`${storeName} 장보기`);
    
    // 카테고리 설정
    const validCats = getCategories();
    setCat(validCats.includes(category) ? category : '식비');
    
    // 계좌 자동 선택 (통화 기반)
    const defaultAcc = accounts.find(a => currency === 'KRW' ? a.currency === 'KRW' : a.currency === 'EUR');
    if (defaultAcc) setAccId(defaultAcc.id);
    
    // 결제수단 설정
    if (paymentMethod) {
      setPayMethod(paymentMethod);
    } else {
      setPayMethod('card');
    }
    
    // 날짜 설정
    if (receiptDate) setDate(receiptDate);
    
    // 메모에 품목 리스트 추가
    if (items && items.length > 0 && memoRef.current) {
      memoRef.current.value = items.map(item => item.name).join(', ');
    }
    
    setReceiptResult(null);
    setMode('manual');
  };


  const testCases = [
    { input: '50유로 5센트', expected: '50,05' },
    { input: '50유로 5', expected: '50,05' },
    { input: '50유로 05', expected: '50,05' },
    { input: '오십유로 오센트', expected: '50,05' },
    { input: '오십유로 오', expected: '50,05' },
    { input: '오십유로삼십', expected: '50,30' },
    { input: '오십유로 삼십', expected: '50,30' },
    { input: '50.30', expected: '50,30' },
    { input: '50,30', expected: '50,30' },
    { input: '50유로', expected: '50,00' },
    { input: '오십유로', expected: '50,00' },
    { input: '50유로 567', expected: '50,00' },
  ];

  const runTest = (text) => {
    const info = explainAmountParse(text, 'EUR');
    return info.formatted;
  };

  const runSingleTest = (text) => {
    const info = explainAmountParse(text, 'EUR');
    setTestDebug(info);
    setTestResult(info.formatted);
  };

  const addNewCat = async () => {
    const nm = newCatRef.current?.value?.trim();
    if (!nm || cats.includes(nm)) return;
    const updated = [...cats, nm]; setCats(updated); setCategories(updated); setCat(nm);
    if (newCatRef.current) newCatRef.current.value = ''; setAddCat(false);
    await dbSaveSettings();
  };

  const save = async () => {
    const memo = memoRef.current?.value || '';
    if (type === 'transfer') {
      if (!fromAmtStr || !toAmtStr) return;
      if (!fromAccId || !toAccId) return;
      if (fromAccId === toAccId) return;
      const fromAcc = accounts.find(a => a.id === fromAccId);
      const toAcc = accounts.find(a => a.id === toAccId);
      const title = titleVal.trim() || `${toAcc?.name || ''} 송금`;
      const entry = {
        type: 'transfer', title,
        fromAccountId: fromAccId, fromAccountName: fromAcc?.name || '',
        fromAmount: parseComma(fromAmtStr, fromCur), fromCurrency: fromCur,
        toAccountId: toAccId, toAccountName: toAcc?.name || '',
        toAmount: parseComma(toAmtStr, toCur), toCurrency: toCur,
        fee: parseComma(feeStr, feeCur) || 0, feeCurrency: feeCur,
        date, memo, rateAtTime: normalizeRate(effectiveRate), rateDate: rateInfo?.date || date,
      };
      if (editing) updateTxn(editing.id, entry);
      else addTxn(entry);
      await dbSaveTxns(getTxns());
      onDone();
      return;
    }
    const title = titleVal.trim() || aiText || cat;
    if (!amtStr) return;
    if (!isVoucher && !accId && accounts.length > 0) return;
    const acc = accounts.find(a => a.id === accId);
    const entry = { title, type, amount: parseComma(amtStr, cur), currency: cur, accountId: isVoucher ? '' : accId, accountName: isVoucher ? '상품권/쿠폰' : acc?.name || '', category: cat, payMethod, memo, date, rateAtTime: effectiveRate, rateDate: rateInfo?.date || date };
    if (editing) updateTxn(editing.id, entry);
    else addTxn(entry);
    await dbSaveTxns(getTxns());
    onDone();
  };

  return jsx('div', { className: 'app-shell', children: jsx('div', { className: 'page', style: { paddingTop: 16 }, children: jsxs(Fragment, { children: [
    jsx(PageHeader, { mb: 22,
      title: jsx('h2', { children: editing ? '내역 수정' : '내역 추가' }),
      right: jsx('span', { className: 'text-13 color-muted', style: { cursor: 'pointer' }, onClick: onDone, children: '취소' }),
    }),
    !editing && jsxs('div', { className: 'toggle-wrap', style: { marginBottom: 22 }, children: [jsx('button', { className: `toggle-btn ${mode === 'ai' ? 'active' : 'inactive'}`, style: { flex: 1 }, onClick: () => setMode('ai'), children: '자연어 입력' }), jsx('button', { className: `toggle-btn ${mode === 'manual' ? 'active' : 'inactive'}`, style: { flex: 1 }, onClick: () => setMode('manual'), children: '직접 입력' })] }),
    mode === 'ai' && !editing && jsxs('div', { style: { marginBottom: 20 }, children: [
      jsxs('div', { style: { display: 'flex', gap: 10, alignItems: 'flex-end' }, children: [
        jsx('input', { className: 'field', placeholder: '예: rewe에서 오십유로 카드로', value: aiText, onChange: e => setAiText(e.target.value), onKeyDown: e => e.key === 'Enter' && !e.nativeEvent?.isComposing && runAI(), style: { flex: 1 } }),
        jsx('button', { onClick: runAI, disabled: aiLoading, style: { background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, paddingBottom: 6, color: aiLoading ? 'var(--gray-400)' : 'var(--black)' }, children: aiLoading ? '···' : '→' }),
      ] }),
      aiResult && jsxs('div', { className: 'parse-result', children: [jsx('span', { className: 'parse-tag primary', children: type === 'expense' ? '지출' : '수입' }), jsx('span', { className: 'parse-tag', children: formatMoney(parseComma(amtStr, cur), cur) }), jsx('span', { className: 'parse-tag', children: cat })] }),
      aiErr && jsx('p', { style: { fontSize: 12, color: 'var(--gray-400)', marginTop: 8 }, children: aiErr }),
      aiResult && jsx('div', { className: 'divider' }),
      DEBUG_MODE && jsxs('div', { className: 'card', style: { marginTop: 16, marginBottom: 0 }, children: [
        jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', marginBottom: 10 }, children: '파싱 테스트 / 디버그' }),
        jsxs('div', { style: { display: 'flex', gap: 10, alignItems: 'flex-end', marginBottom: 10 }, children: [
          jsx('input', { className: 'field', placeholder: '예: 오십유로삼십 / 50.30 / 50,30', value: testInput, onChange: e => setTestInput(e.target.value), onKeyDown: e => e.key === 'Enter' && !e.nativeEvent?.isComposing && runSingleTest(testInput), style: { flex: 1 } }),
          jsx('button', { className: 'btn-sm', onClick: () => runSingleTest(testInput), children: '실행' }),
        ] }),
        testDebug && jsxs(Fragment, { children: [
          jsxs('div', { className: 'parse-result', children: [
            jsx('span', { className: 'parse-tag primary', children: testResult || 'FAIL' }),
            jsx('span', { className: 'parse-tag', children: `rule: ${testDebug.matchedRule}` }),
            jsx('span', { className: 'parse-tag', children: `minor: ${testDebug.hasMinorUnit ? 'yes' : 'no'}` }),
          ] }),
          testDebug.detail && jsx('p', { style: { fontSize: 12, color: 'var(--gray-600)', marginTop: 10, lineHeight: 1.6 }, children: testDebug.detail }),
          jsx('div', { className: 'panel-outlined', style: { marginTop: 10, maxHeight: 180, overflowY: 'auto', background: 'var(--white)' }, children:
            testDebug.steps?.length
              ? testDebug.steps.map((step, idx) => jsx('div', { className: 'border-bottom', style: { padding: '8px 0', fontSize: 11, color: step.matched ? 'var(--black)' : 'var(--gray-400)' }, children: `${idx + 1}. ${step.rule} · ${step.matched ? 'match' : 'skip'}${step.detail ? ` · ${step.detail}` : ''}` }, `${step.rule}-${idx}`))
              : jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)' }, children: '디버그 단계가 없어요' })
          }),
        ] }),
        jsx('div', { className: 'divider' }),
        jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', marginBottom: 8 }, children: '자동 테스트' }),
        jsx('div', { style: { display: 'grid', gap: 8, maxHeight: 260, overflowY: 'auto' }, children:
          testCases.map((t, i) => {
            const result = runTest(t.input);
            const ok = result === t.expected;
            return jsxs('div', { className: 'panel-outlined', style: { padding: 10, background: ok ? 'var(--white)' : '#fff7f4' }, children: [
              jsx('div', { style: { fontSize: 12, fontWeight: 500, marginBottom: 4 }, children: t.input }),
              jsxs('div', { style: { fontSize: 11, color: ok ? 'var(--gray-600)' : '#C04B1E', lineHeight: 1.6 }, children: [`결과 ${result} · 기대 ${t.expected} · `, ok ? 'PASS' : 'FAIL'] }),
            ] }, `test-${i}`);
          })
        }),
      ] }),
    ] }),
    
    // 영수증 스캔 섹션
    !editing && !receiptScanning && !receiptResult && mode === 'ai' && jsxs('div', { style: { marginBottom: 24 }, children: [
      jsx('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }, children: [
        jsx('div', { style: { flex: 1, height: '0.5px', background: 'var(--gray-200)' } }),
        jsx('span', { style: { fontSize: 12, color: 'var(--gray-400)' }, children: '또는' }),
        jsx('div', { style: { flex: 1, height: '0.5px', background: 'var(--gray-200)' } })
      ] }),
      jsxs('div', { style: { display: 'flex', gap: 10 }, children: [
        jsxs('button', { 
          className: 'btn-ghost', 
          onClick: handleCameraClick,
          style: { flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, padding: 16, marginTop: 0 },
          children: [
            jsx(IconCamera, { size: 24, color: 'var(--gray-600)', sw: 1.5 }),
            jsx('span', { style: { fontSize: 13 }, children: '촬영' })
          ]
        }),
        jsxs('button', { 
          className: 'btn-ghost', 
          onClick: handleGalleryClick,
          style: { flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, padding: 16, marginTop: 0 },
          children: [
            jsx(IconImage, { size: 24, color: 'var(--gray-600)', sw: 1.5 }),
            jsx('span', { style: { fontSize: 13 }, children: '사진' })
          ]
        })
      ] }),
      jsx('input', { 
        ref: fileInputRef, 
        type: 'file', 
        accept: 'image/*',
        style: { display: 'none' },
        onChange: (e) => {
          const file = e.target.files?.[0];
          if (file) handleReceiptScan(file);
          e.target.value = '';
        }

function AccountsTab({ globalRate }) {
  const [accs, setAccsState] = useState([]);
  const [txns, setTxnsState] = useState([]);
  const [cur, setCur] = useState('EUR');
  const [editId, setEditId] = useState(null);
  const [addMode, setAddMode] = useState(false);
  const [correctId, setCorrectId] = useState(null);
  const [calYear, setCalYear] = useState(new Date().getFullYear());
  const [calMonth, setCalMonth] = useState(new Date().getMonth());
  const [calDay, setCalDay] = useState(null);
  const [showCal, setShowCal] = useState(false);
  const rate = normalizeRate(globalRate || getRate().rate);
  const today = new Date(), todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  useEffect(() => { setAccsState(getAccounts()); setTxnsState(getTxns()); }, []);
  const reload = async newAccs => { setAccounts(newAccs); setAccsState(newAccs); setTxnsState(getTxns()); await dbSaveAccounts(newAccs); };

  const toEur = (bal, currency) => convertByRate(bal, currency, 'EUR', rate);
  const toKrw = (bal, currency) => convertByRate(bal, currency, 'KRW', rate);

  // 컴포넌트 state 기반 잔액 계산 (전역 calcBalance는 localStorage를 읽으므로
  // 렌더 중 state와 동기화된 값이 필요할 때 이 버전을 사용)
  const getBalance = (accId, untilDate = todayStr) => {
    const acc = accs.find(a => a.id === accId);
    if (!acc) return 0;
    const base = acc.initialBalance ?? acc.balance ?? 0;
    let delta = 0;
    txns.filter(t => !untilDate || t.date <= untilDate).forEach(t => {
      if (t.type === 'transfer') {
        if (t.fromAccountId === accId) delta -= (t.fromAmount || 0);
        if (t.toAccountId === accId) delta += (t.toAmount || 0);
      } else if (t.type === 'income' && t.accountId === accId) { delta += (t.amount || 0);
      } else if (t.type === 'expense' && t.accountId === accId) { delta -= (t.amount || 0); }
    });
    return base + delta;
  };

  const accsWithBal = accs.map(a => ({ ...a, computedBalance: getBalance(a.id, todayStr) }));
  const fmtBal = a => cur === 'EUR' ? formatMoney(toEur(a.computedBalance, a.currency), 'EUR') : formatMoney(toKrw(a.computedBalance, a.currency), 'KRW');
  const fmtAlt = a => cur === 'EUR' ? `≈ ${formatMoney(toKrw(a.computedBalance, a.currency), 'KRW')}` : `≈ ${formatMoney(toEur(a.computedBalance, a.currency), 'EUR')}`;

  const COLORS = ['#111111','#888780','#B4B2A9','#444441','#D3D1C7','#5F5E5A','#2C2C2A','#F1EFE8'];
  const getColor = i => accs[i]?.color || COLORS[i % COLORS.length];

  // 날짜 기준 스냅샷 (방식 B)
  const getSnapshot = (yr, mo, dy) => {

// ─── AUTH PAGE ────────────────────────────────────────────────────────────────
function AuthPage({ onAuth, onClose }) {
  const [mode, setMode] = useState('login');   // 'login' | 'signup' | 'reset'
  const [email, setEmail] = useState('');
  const [pw, setPw]       = useState('');
  const [pw2, setPw2]     = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]     = useState('');
  const [msg, setMsg]     = useState('');

  const submit = async () => {
    setErr(''); setMsg('');
    if (!email) { setErr('이메일을 입력해주세요.'); return; }

    // ── 비밀번호 재설정 이메일 발송 ──────────────────────────────
    if (mode === 'reset') {
      setLoading(true);
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname,
      });
      setLoading(false);
      if (error) { setErr('이메일 발송에 실패했어요. 다시 시도해주세요.'); return; }
      setMsg('비밀번호 재설정 링크를 보냈어요. 이메일을 확인해주세요!');
      return;
    }

    if (!pw) { setErr('비밀번호를 입력해주세요.'); return; }
    if (mode === 'signup' && pw !== pw2) { setErr('비밀번호가 일치하지 않아요.'); return; }
    if (pw.length < 6) { setErr('비밀번호는 6자 이상이어야 해요.'); return; }
    setLoading(true);
    if (mode === 'login') {
      const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
      if (error) { setErr('이메일 또는 비밀번호가 올바르지 않아요.'); setLoading(false); return; }
    } else {
      const { error } = await supabase.auth.signUp({ email, password: pw });
      if (error) { setErr('회원가입에 실패했어요: ' + error.message); setLoading(false); return; }
      setMsg('가입 확인 이메일을 보냈어요. 이메일을 확인해주세요!');
      setLoading(false); return;
    }
    setLoading(false);
    onAuth();
  };

  const googleLogin = async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href },
    });
  };

  const switchMode = (next) => { setMode(next); setErr(''); setMsg(''); };
