    jsxs('div', { className: 'auth-shell', children: [
      jsxs('div', { children: [
        jsxs('div', { className: 'auth-logo', children: [
          jsx('img', { src: '/money/icons/icon-192.png', style: { width: 36, height: 36, borderRadius: 10 } }),
          jsxs('p', { style: { fontSize: 16, fontWeight: 600, letterSpacing: '-0.3px' },
            children: ['Brezel ', jsx('span', { style: { fontWeight: 300 }, children: 'Money' })] }),
          onClose && jsx('button', { className: 'btn-icon', onClick: onClose,
            style: { marginLeft: 'auto', color: 'var(--gray-400)', fontSize: 13 },
            children: '← 돌아가기' }),
        ] }),
        jsx('h1', { className: 'auth-title', children: titles[mode] }),
        jsx('p', { className: 'auth-sub', children: subs[mode] }),

        // 구글 로그인 (reset 모드에서는 숨김)
        mode !== 'reset' && jsxs(Fragment, { children: [
          jsxs('button', { className: 'btn-google', onClick: googleLogin, children: [
            jsx('svg', { width: 18, height: 18, viewBox: '0 0 48 48', children: [
              jsx('path', { fill: '#EA4335', d: 'M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z' }),
              jsx('path', { fill: '#4285F4', d: 'M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z' }),
              jsx('path', { fill: '#FBBC05', d: 'M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z' }),
              jsx('path', { fill: '#34A853', d: 'M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z' }),
            ] }),
            mode === 'login' ? 'Google로 로그인' : 'Google로 가입',
          ] }),
          jsxs('div', { className: 'auth-divider', children: [jsx('span', { children: '또는' })] }),
        ] }),

        // 이메일 입력
        jsxs('div', { className: 'field-wrap', children: [
          jsx('label', { children: '이메일' }),
          jsx('input', { className: 'field', type: 'email', placeholder: 'you@example.com',
            value: email, onChange: e => setEmail(e.target.value),
            onKeyDown: e => e.key === 'Enter' && submit() }),
        ] }),

        // 비밀번호 (reset 모드에서는 숨김)
        mode !== 'reset' && jsxs('div', { className: 'field-wrap', children: [
          jsxs('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }, children: [
            jsx('label', { style: { marginBottom: 0 }, children: '비밀번호' }),
            mode === 'login' && jsx('span', {
              onClick: () => switchMode('reset'),
              style: { fontSize: 11, color: 'var(--gray-400)', cursor: 'pointer', borderBottom: '1px solid var(--gray-200)' },
              children: '비밀번호를 잊으셨나요?',
            }),
          ] }),
          jsx('input', { className: 'field', type: 'password', placeholder: '6자 이상',
            value: pw, onChange: e => setPw(e.target.value),
            onKeyDown: e => e.key === 'Enter' && submit() }),
        ] }),

        // 비밀번호 확인 (signup만)
        mode === 'signup' && jsxs('div', { className: 'field-wrap', children: [
          jsx('label', { children: '비밀번호 확인' }),
          jsx('input', { className: 'field', type: 'password', placeholder: '동일하게 입력',
            value: pw2, onChange: e => setPw2(e.target.value),
            onKeyDown: e => e.key === 'Enter' && submit() }),
        ] }),

        jsx('p', { className: 'auth-error', children: err }),
        msg && jsx('p', { style: { fontSize: 12, color: '#1A7A4A', marginTop: 8, lineHeight: 1.6 }, children: msg }),

        jsx('button', { className: 'btn', onClick: submit, disabled: loading,
          style: { opacity: loading ? 0.6 : 1 },
          children: loading ? '처리 중…' : btnLabels[mode] }),

        // 하단 전환 링크
        mode === 'reset'
          ? jsx('p', { className: 'auth-switch', children:
              jsxs(Fragment, { children: [
                jsx('span', { onClick: () => switchMode('login'), children: '← 로그인으로 돌아가기' }),
              ] }),
            })
          : jsxs('p', { className: 'auth-switch', children: [
              mode === 'login' ? '아직 계정이 없으신가요? ' : '이미 계정이 있으신가요? ',
              jsx('span', { onClick: () => switchMode(mode === 'login' ? 'signup' : 'login'),
                children: mode === 'login' ? '회원가입' : '로그인' }),
            ] }),
      ] }),

      jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', textAlign: 'center' },
        children: '데이터는 암호화되어 안전하게 보관돼요' }),
    ] }),
  });
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function BottomNav({ active, onChange }) {
  const items = [
    { id: 'home', Icon: IconHome, label: '홈' },
    { id: 'history', Icon: IconList, label: '내역' },
    { id: 'add', Icon: null, label: '' },
    { id: 'accounts', Icon: IconWallet, label: '자산' },
    { id: 'fixed', Icon: IconFixed, label: '고정비' },
  ];
  return jsx('nav', { className: 'bottom-nav', children: items.map(item => {
    if (item.id === 'add') return jsx('div', { key: 'add', className: 'nav-plus', onClick: () => onChange('add'), children: jsx(IconPlus, { size: 20, color: 'white' }) });
    const on = active === item.id;
    return jsxs('div', { key: item.id, className: 'nav-item', onClick: () => onChange(item.id), children: [jsx(item.Icon, { size: 20, color: on ? 'var(--black)' : 'var(--gray-400)', sw: on ? 2 : 1.5 }), jsx('span', { className: `nav-label ${on ? 'active' : ''}`, children: item.label })] });
  }) });
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────

function App() {
  const [authUser, setAuthUser]   = useState(undefined);
  const [dbReady, setDbReady]     = useState(false);
  const [onboardedState, setOnboardedState] = useState(null);
  const [onboardingInitialStep, setOnboardingInitialStep] = useState(0);
  const [tab, setTab]             = useState('home');
  const [prevTab, setPrevTab]     = useState('home');
  const [editing, setEditing]     = useState(null);
  const [settings, setSettings]   = useState(false);
  const [homeTxnDetail, setHomeTxnDetail] = useState(null);
  const [showAuth, setShowAuth]   = useState(false);
  const [globalRate, setGlobalRate] = useState(normalizeRate(getRate().rate));

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => {
      setAuthUser(data.session?.user ?? null);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setAuthUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    fetchLatestRate().then(r => setGlobalRate(normalizeRate(r)));
  }, []);

  useEffect(() => {
    if (authUser === undefined) return;

    if (!authUser) {
      setActiveScopeUserId(null);
      setDbReady(true);
      setOnboardingInitialStep(0);
      setOnboardedState(isOnboarded());
      return;
    }

    setDbReady(false);
    setOnboardedState(null);

    (async () => {
      try {
        setActiveScopeUserId(authUser.id);
        await dbLoadAll();

        const snapshot = {
          accounts: getAccounts(),
          txns: getTxns(),
          fixedExp: getFixedExp(),
          fixedInc: getFixedInc(),
        };
        const hasExistingUserData = hasAppData(snapshot);
        log.info('AUTH', 'post-login dataset check', {
          uid: authUser.id,
          hasExistingUserData,
          accounts: snapshot.accounts.length,
          txns: snapshot.txns.length,
          fixedExp: snapshot.fixedExp.length,
          fixedInc: snapshot.fixedInc.length,
        });

        if (hasExistingUserData) {
          if (!isOnboarded()) setOnboarded();
          setOnboardedState(true);
          setOnboardingInitialStep(1);
          setTab('home');
          return;
        }

        const guestExists = hasGuestData();
        const migrationDone = hasMigrationDoneForUser(authUser.id);
        log.info('AUTH', 'first-login candidate', {
          uid: authUser.id,
          guestExists,
          migrationDone,
        });

        if (guestExists && !migrationDone) {
          const ok = window.confirm('이 기기의 비로그인 데이터를 현재 계정으로 가져올까요?');
          if (ok) {
            const imported = await migrateGuestToCurrentUser();
            if (imported) {
              await dbLoadAll();
              if (!isOnboarded()) setOnboarded();
              setOnboardedState(true);
              setOnboardingInitialStep(1);
              setTab('home');
              return;
            }
          }
        }

        setOnboardingInitialStep(1);
        setOnboardedState(false);
      } catch (e) {
        log.error('AUTH', 'login flow 오류:', e);
        setOnboardingInitialStep(authUser ? 1 : 0);
        setOnboardedState(!!authUser ? false : isOnboarded());
      } finally {
        setDbReady(true);
      }
    })();
  }, [authUser]);

  const handleSignOut = async () => {
    await supabase.auth.signOut();
    setShowAuth(false);
  };

  if (authUser === undefined || onboardedState === null) return null;
  if (authUser && !dbReady) return null;

  if (showAuth) return jsx(AuthPage, {
    onAuth: () => setShowAuth(false),
    onClose: () => setShowAuth(false),
  });

  if (!onboardedState) return jsx(Onboarding, {
    initialStep: onboardingInitialStep,
    hideAuthEntry: !!authUser,
    onDone: async (payload) => {
      if (authUser) {
        await dbSaveAll(payload);
        await dbLoadAll();
      }
      setOnboarded();
      setOnboardedState(true);
      setTab('home');
    },
    onLogin: () => setShowAuth(true)
  });

  if (settings) return jsx(SettingsPage, {
    onClose: () => setSettings(false),
    onSignOut: handleSignOut,
    onShowAuth: () => { setSettings(false); setShowAuth(true); },
    authUser,
  });
  if (homeTxnDetail) return jsx('div', { className: 'app-shell', children: jsx(TxnDetail, { txn: homeTxnDetail, globalRate, onBack: () => setHomeTxnDetail(null), onEdit: t => { setHomeTxnDetail(null); setEditing(t); setPrevTab('home'); setTab('add'); } }) });
  if (tab === 'add') return jsx('div', { className: 'app-shell', children: jsx(AddTransaction, { editing, onDone: () => { setEditing(null); setTab(prevTab); } }) });

  return jsxs('div', { className: 'app-shell', children: [
    tab === 'home'     && jsx(HomeTab,     { onOpenSettings: () => setSettings(true), onDetailOpen: t => setHomeTxnDetail(t), authUser, globalRate }),
    tab === 'history'  && jsx(HistoryTab,  { onEdit: t => { setEditing(t); setPrevTab(tab); setTab('add'); }, globalRate }),
    tab === 'accounts' && jsx(AccountsTab, { globalRate }),
    tab === 'fixed'    && jsx(FixedTab,    { globalRate }),
    jsx(BottomNav, { active: tab, onChange: t => { if (t === 'add') { setEditing(null); setPrevTab(tab); setTab('add'); } else setTab(t); } }),
  ] });
}

createRoot(document.getElementById('root')).render(jsx(StrictMode, { children: jsx(App, {}) }));

// 로딩 스피너 숨기기
setTimeout(() => {
  const loader = document.getElementById('app-loader');
  if (loader) {
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 300);
  }
}, 100);

// ─── Service Worker 등록 ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('/money/service-worker.js', {
        scope: '/money/',
      });

      debugLog('[SW] 등록 완료:', reg.scope);

      reg.update();

      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;

        debugLog('[SW] 새 버전 설치 시작');

        newWorker.addEventListener('statechange', () => {
          debugLog('[SW] 상태:', newWorker.state);

          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            debugLog('[SW] 새 버전 설치 완료 → 자동 새로고침');
            window.location.reload();
          }
        });
      });

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        debugLog('[SW] controller 변경 감지 → 자동 새로고침');
        window.location.reload();
      });

      navigator.serviceWorker.addEventListener('message', event => {
        if (event.data?.type === 'SW_UPDATED') {
          debugLog('[SW] 새 버전 활성화 메시지 수신 → 자동 새로고침');
          window.location.reload();
        }
      });
    } catch (e) {
      console.error('[SW] 등록 실패:', e);
    }
  });
}
</script>
</body>
