<!-- SAFE VERSION PATCH SNIPPET -->

<script>
useEffect(() => {
  if (!authUser) {
    setActiveScopeUserId(null);
    setDbReady(true);
    return;
  }

  setDbReady(false);

  (async () => {
    try {
      setActiveScopeUserId(authUser.id);

      await dbLoadAll();

      const hasData =
        getAccounts().length > 0 ||
        getTxns().length > 0 ||
        getFixedExp().length > 0 ||
        getFixedInc().length > 0;

      if (hasData && !isOnboarded()) {
        setOnboarded();
      }

      setDbReady(true);

    } catch (e) {
      console.error('[AUTH FLOW ERROR]', e);
      setDbReady(true);
    }
  })();
}, [authUser]);

window.importGuestDataSafely = async () => {
  const cloudHasData =
    getAccounts().length > 0 ||
    getTxns().length > 0 ||
    getFixedExp().length > 0 ||
    getFixedInc().length > 0;

  if (cloudHasData) {
    const ok = confirm('⚠️ 현재 계정 데이터가 있습니다. 덮어쓸까요?');
    if (!ok) return;
  }

  await migrateGuestToCurrentUser();
  alert('가져오기 완료! 새로고침합니다.');
  location.reload();
};
</script>
