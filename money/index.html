<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>교민 가계부</title>

<!-- PWA -->
<link rel="manifest" href="/money/manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="교민가계부"/>
<meta name="theme-color" content="#111111"/>
<link rel="apple-touch-icon" href="/money/icons/icon-192.png"/>
<style>
@import "https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap";
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#111;--white:#fff;
  --gray-50:#f8f8f8;--gray-100:#f0f0f0;--gray-200:#e0e0e0;--gray-400:#999;--gray-600:#555;
  --accent:#FF7A50;
  --font:"DM Sans",sans-serif;--mono:"DM Mono",monospace;
  --radius:14px;--radius-sm:8px;
}
html,body,#root{background:var(--white);width:100%;height:100%;font-family:var(--font);color:var(--black);-webkit-font-smoothing:antialiased}
#root{background:var(--gray-50);justify-content:center;display:flex}
.app-shell{background:var(--white);flex-direction:column;width:100%;max-width:430px;min-height:100%;display:flex;position:relative}
h1{font-size:26px;font-weight:500;line-height:1.2}
h2{font-size:20px;font-weight:500}
p{line-height:1.6}
.text-muted{color:var(--gray-400);font-size:12px}
.page{flex:1;padding:16px 20px 100px;overflow-y:auto}
.section{margin-bottom:28px}
.section-title{letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);margin-bottom:12px;font-size:11px;font-weight:500}
.divider{background:var(--gray-200);height:.5px;margin:18px 0}
.row{border-bottom:.5px solid var(--gray-100);justify-content:space-between;align-items:center;padding:12px 0;display:flex}
.row:last-child{border-bottom:none}
.field{border:none;border-bottom:1px solid var(--gray-200);color:var(--black);width:100%;font-size:14px;font-family:var(--font);background:transparent;outline:none;padding:6px 0;transition:border-color .2s}
.field:focus{border-color:var(--black)}
.field::placeholder{color:var(--gray-400)}
.field-sm{border:none;border-bottom:1px solid var(--gray-200);color:var(--black);text-align:center;width:36px;font-size:13px;font-family:var(--font);background:transparent;outline:none;padding:2px 0}
.field-amt{border:none;border-bottom:1px solid var(--gray-200);color:var(--black);text-align:right;width:72px;font-size:13px;font-family:var(--font);background:transparent;outline:none;padding:2px 0}
.field-amt::placeholder,.field-sm::placeholder{color:var(--gray-400)}
.btn{background:var(--black);width:100%;color:var(--white);border-radius:var(--radius);font-size:15px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;padding:15px;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-ghost{width:100%;color:var(--gray-400);border:.5px solid var(--gray-200);border-radius:var(--radius);font-size:14px;font-family:var(--font);cursor:pointer;background:transparent;margin-top:8px;padding:13px}
.btn-sm{background:var(--black);color:var(--white);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;border-radius:20px;padding:5px 14px}
.btn-sm-outline{color:var(--gray-600);border:.5px solid var(--gray-200);font-size:12px;font-family:var(--font);cursor:pointer;background:transparent;border-radius:20px;padding:5px 14px}
.toggle-wrap{background:var(--gray-100);border-radius:20px;gap:2px;padding:3px;display:flex}
.toggle-btn{cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font);border:none;border-radius:16px;padding:4px 14px;transition:all .15s}
.toggle-btn.active{background:var(--black);color:var(--white)}
.toggle-btn.inactive{color:var(--gray-400);background:transparent}
.check-on{background:var(--black);cursor:pointer;border-radius:4px;flex-shrink:0;justify-content:center;align-items:center;width:18px;height:18px;display:flex}
.check-off{border:1px solid var(--gray-200);cursor:pointer;border-radius:4px;flex-shrink:0;width:18px;height:18px}
.progress-bar{gap:4px;margin-bottom:24px;display:flex}
.progress-bar span{border-radius:2px;flex:1;height:2px}
.progress-bar span.on{background:var(--black)}
.progress-bar span.off{background:var(--gray-200)}
.bottom-nav{background:var(--white);border-top:.5px solid var(--gray-100);z-index:100;justify-content:space-around;align-items:center;width:100%;max-width:430px;padding:10px 0 20px;display:flex;position:fixed;bottom:0;left:50%;transform:translate(-50%)}
.nav-item{cursor:pointer;flex-direction:column;align-items:center;gap:4px;min-width:52px;display:flex}
.nav-label{color:var(--gray-400);font-size:10px}
.nav-label.active{color:var(--black);font-weight:500}
.nav-plus{background:var(--black);cursor:pointer;border-radius:50%;justify-content:center;align-items:center;width:44px;height:44px;display:flex}
.card{background:var(--gray-50);border-radius:var(--radius);margin-bottom:12px;padding:16px}
.add-row{cursor:pointer;color:var(--gray-400);align-items:center;gap:10px;padding:12px 0;display:flex}
.add-circle{border:1px solid var(--gray-200);width:22px;height:22px;color:var(--gray-400);border-radius:50%;justify-content:center;align-items:center;font-size:14px;display:flex}
.parse-result{flex-wrap:wrap;gap:6px;margin-top:10px;display:flex}
.parse-tag{border:.5px solid var(--gray-200);color:var(--gray-600);border-radius:12px;padding:3px 10px;font-size:11px}
.parse-tag.primary{background:var(--black);color:var(--white);border-color:var(--black)}
.pill-on{background:var(--black);color:var(--white);cursor:pointer;font-size:12px;font-family:var(--font);border:none;border-radius:14px;padding:4px 12px}
.pill-off{color:var(--gray-400);border:.5px solid var(--gray-200);cursor:pointer;font-size:12px;font-family:var(--font);background:transparent;border-radius:14px;padding:4px 12px}
.bar-track{background:var(--gray-100);border-radius:2px;height:3px;margin-top:8px}
.bar-fill{background:var(--black);border-radius:2px;height:100%}
/* 펼침 애니메이션 */
.expand-enter{animation:.2s ease forwards expandIn}
@keyframes expandIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:.25s forwards fadeIn}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement as h, useState, useEffect, useRef, Fragment, StrictMode } from 'https://esm.sh/react@19';
import { createRoot } from 'https://esm.sh/react-dom@19/client';
import { jsx, jsxs } from 'https://esm.sh/react@19/jsx-runtime';

// ─── lucide icons (inline SVG helpers) ───────────────────────────────────────
const Icon = ({ d, size=24, color='currentColor', sw=2, ...p }) =>
  jsx('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,
    strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round','aria-hidden':true,...p,
    children:Array.isArray(d)?d.map((dd,i)=>jsx('path',{d:dd},i)):jsx('path',{d})});
const IconHome   = p => jsx(Icon,{...p,d:['M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8','M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z']});
const IconList   = p => jsx(Icon,{...p,d:['M3 5h.01','M3 12h.01','M3 19h.01','M8 5h13','M8 12h13','M8 19h13']});
const IconPlus   = p => jsx(Icon,{...p,d:['M5 12h14','M12 5v14']});
const IconWallet = p => jsx(Icon,{...p,d:['M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1','M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4']});
const IconCal    = p => jsx(Icon,{...p,d:['M8 2v4','M16 2v4','M3 10h18','rect:3,4,18,18,2']});
const IconCalendar = ({size=20,color='currentColor',sw=1.5}) =>
  jsx('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:color,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round','aria-hidden':true,
    children:[jsx('path',{d:'M8 2v4'},0),jsx('path',{d:'M16 2v4'},1),jsx('rect',{width:'18',height:'18',x:'3',y:'4',rx:'2'},2),jsx('path',{d:'M3 10h18'},3)]});
const IconFixed  = p => jsx(IconCalendar,p);
const IconX      = p => jsx(Icon,{...p,d:['M18 6 6 18','M6 6l12 12']});
const IconSettings = p => jsx('svg',{width:p.size||24,height:p.size||24,viewBox:'0 0 24 24',fill:'none',stroke:p.color||'currentColor',strokeWidth:p.sw||1.5,strokeLinecap:'round',strokeLinejoin:'round','aria-hidden':true,
  children:[jsx('path',{d:'M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915'},0),jsx('circle',{cx:'12',cy:'12',r:'3'},1)]});
const IconFilter = p => jsx('svg',{width:p.size||24,height:p.size||24,viewBox:'0 0 24 24',fill:'none',stroke:p.color||'currentColor',strokeWidth:p.sw||1.5,strokeLinecap:'round',strokeLinejoin:'round','aria-hidden':true,
  children:[jsx('path',{d:'M10 5H3'},0),jsx('path',{d:'M12 19H3'},1),jsx('path',{d:'M14 3v4'},2),jsx('path',{d:'M16 17v4'},3),jsx('path',{d:'M21 12h-9'},4),jsx('path',{d:'M21 19h-5'},5),jsx('path',{d:'M21 5h-7'},6),jsx('path',{d:'M8 10v4'},7),jsx('path',{d:'M8 12H3'},8)]});
const IconTrash  = p => jsx('svg',{width:p.size||24,height:p.size||24,viewBox:'0 0 24 24',fill:'none',stroke:p.color||'currentColor',strokeWidth:p.sw||1.5,strokeLinecap:'round',strokeLinejoin:'round','aria-hidden':true,
  children:[jsx('path',{d:'M10 11v6'},0),jsx('path',{d:'M14 11v6'},1),jsx('path',{d:'M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6'},2),jsx('path',{d:'M3 6h18'},3),jsx('path',{d:'M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2'},4)]});
const IconBack   = p => jsx(Icon,{...p,d:'M15 18l-6-6 6-6'});
const CheckIcon  = () => jsx('svg',{width:10,height:8,viewBox:'0 0 10 8',fill:'none',children:jsx('path',{d:'M1 4l3 3 5-6',stroke:'white',strokeWidth:'1.5',strokeLinecap:'round',strokeLinejoin:'round'})});

// ─── category icons ───────────────────────────────────────────────────────────
const CATEGORY_ICONS = {
  '식비':     p => jsx(Icon,{...p,d:['M2 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2','M7 2v20','M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7']}),
  '외식':     p => jsx(Icon,{...p,d:['M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2','M7 2v20','M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7']}),
  '교통':     p => jsx(Icon,{...p,d:['M8 6v6','M15 6v6','M2 12h19.6','M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3','M7 18h7','M10 18a2 2 0 1 0 4 0 2 2 0 0 0-4 0','M17 18a2 2 0 1 0 4 0 2 2 0 0 0-4 0']}),
  '의료':     p => jsx(Icon,{...p,d:['M11 2a2 2 0 0 0-2 2v5H4a2 2 0 0 0-2 2v2c0 1.1.9 2 2 2h5v5c0 1.1.9 2 2 2h2a2 2 0 0 0 2-2v-5h5a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2h-5V4a2 2 0 0 0-2-2h-2z']}),
  '쇼핑':     p => jsx(Icon,{...p,d:['M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z','M3 6h18','M16 10a4 4 0 0 1-8 0']}),
  '카페':     p => jsx(Icon,{...p,d:['M10 2v2','M14 2v2','M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h14a4 4 0 1 1 0 8h-1','M6 2v2']}),
  '구독':     p => jsx(Icon,{...p,d:['M21 12V7H5a2 2 0 0 1 0-4h14v4','M3 5v14a2 2 0 0 0 2 2h16v-5','M18 12a2 2 0 0 0 0 4h4v-4z']}),
  '공과금':   p => jsx(Icon,{...p,d:'M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z'}),
  '주거':     p => jsx(Icon,{...p,d:['M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8','M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z']}),
  '통신':     p => jsx(Icon,{...p,d:['M5 12.55a11 11 0 0 1 14.08 0','M1.42 9a16 16 0 0 1 21.16 0','M8.53 16.11a6 6 0 0 1 6.95 0','M12 20h.01']}),
  '보험':     p => jsx(Icon,{...p,d:['M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z']}),
  '금융':     p => jsx(Icon,{...p,d:['M12 2v20','M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6']}),
  '교육':     p => jsx(Icon,{...p,d:['M22 10v6M2 10l10-5 10 5-10 5z','M6 12v5c3 3 9 3 12 0v-5']}),
  '육아':     p => jsx(Icon,{...p,d:['M9 12h.01','M15 12h.01','M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5','M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 3']}),
  '송금':     p => jsx(Icon,{...p,d:['M8 3 4 7l4 4','M4 7h16','M16 21l4-4-4-4','M20 17H4']}),
  '급여':     p => jsx(Icon,{...p,d:['M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4','M4 6v12c0 1.1.9 2 2 2h14v-4','M12 12h.01']}),
  '식비지원금': p => jsx(Icon,{...p,d:['M12 7v14','M20 11v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8','M7.5 7a1 1 0 0 1 0-5A4.8 8 0 0 1 12 7a4.8 8 0 0 1 4.5-5 1 1 0 0 1 0 5','M3 7h18a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v0a1 1 0 0 0 1 1z']}),
  '여행':     p => jsx(Icon,{...p,d:['M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2','M4 7h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z','M4 12h16']}),
  '기타':     p => jsx(Icon,{...p,d:['M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0','M19 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0','M5 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0-2 0']}),
};
const CategoryIcon = ({ cat, size=16, color='var(--gray-600)' }) => {
  const C = CATEGORY_ICONS[cat] || CATEGORY_ICONS['기타'];
  return jsx(C, { size, color, sw: 1.5 });
};

// ─── storage ─────────────────────────────────────────────────────────────────
const K = {
  ONBOARDED: 'gyembu_onboarded', ACCOUNTS: 'gyembu_accounts',
  FIXED_EXP: 'gyembu_fixed', FIXED_INC: 'gyembu_fixed_income',
  TRANSACTIONS: 'gyembu_transactions', RATE: 'gyembu_rate',
  CATEGORIES: 'gyembu_categories', BUDGET: 'gyembu_budget',
  SYNCED: 'gyembu_synced_months', START_MONTH: 'gyembu_start_month',
};
const ls = {
  get: k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
const isOnboarded   = () => !!ls.get(K.ONBOARDED);
const setOnboarded  = () => {
  ls.set(K.ONBOARDED, true);
  // 온보딩 완료 시점의 연월을 기록 — 고정비 소급 적용 방지
  if (!ls.get(K.START_MONTH)) {
    const now = new Date();
    ls.set(K.START_MONTH, { year: now.getFullYear(), month: now.getMonth() });
  }
};
const getAccounts   = () => ls.get(K.ACCOUNTS) || [];
const setAccounts   = v  => ls.set(K.ACCOUNTS, v);
const getFixedExp   = () => ls.get(K.FIXED_EXP) || [];
const setFixedExp   = v  => ls.set(K.FIXED_EXP, v);
const getFixedInc   = () => ls.get(K.FIXED_INC) || [];
const setFixedInc   = v  => ls.set(K.FIXED_INC, v);
const getTxns       = () => ls.get(K.TRANSACTIONS) || [];
const setTxns       = v  => ls.set(K.TRANSACTIONS, v);
const getRate       = () => ls.get(K.RATE) || { rate: 1480, updatedAt: null };
const setRate       = v  => ls.set(K.RATE, { rate: v, updatedAt: new Date().toISOString() });
const getCategories = () => ls.get(K.CATEGORIES) || DEFAULT_CATS;
const setCategories = v  => ls.set(K.CATEGORIES, v);
const getBudget     = () => ls.get(K.BUDGET) || { eur: null, excludeCategories: ['식비지원금'] };
const setBudget     = v  => ls.set(K.BUDGET, v);

// ─── transaction helpers ──────────────────────────────────────────────────────
const addTxn = entry => {
  const txns = getTxns();
  const t = { ...entry, id: `t_${Date.now()}_${Math.random().toString(36).slice(2)}`, createdAt: new Date().toISOString() };
  setTxns([t, ...txns]);
  applyBalanceDelta(t.accountId, t.type === 'expense' ? -t.amount : t.amount, t.currency);
  return t;
};
const updateTxn = (id, patch) => {
  const txns = getTxns();
  const old = txns.find(t => t.id === id);
  if (old) {
    applyBalanceDelta(old.accountId, old.type === 'expense' ? old.amount : -old.amount, old.currency);
    applyBalanceDelta(patch.accountId || old.accountId, (patch.type || old.type) === 'expense' ? -(patch.amount || old.amount) : (patch.amount || old.amount), patch.currency || old.currency);
  }
  setTxns(txns.map(t => t.id === id ? { ...t, ...patch } : t));
};
const deleteTxn = id => {
  const txns = getTxns();
  const t = txns.find(t => t.id === id);
  if (t && !t.fixedId) applyBalanceDelta(t.accountId, t.type === 'expense' ? t.amount : -t.amount, t.currency);
  setTxns(txns.filter(t => t.id !== id));
};
const applyBalanceDelta = (accountId, delta, _currency) => {
  if (!accountId) return;
  const accs = getAccounts();
  if (!accs.find(a => a.id === accountId)) return;
  setAccounts(accs.map(a => a.id === accountId ? { ...a, balance: Math.max(0, (a.balance || 0) + delta) } : a));
};
const correctBalance = (accountId, newBalance) => {
  const accs = getAccounts();
  const acc = accs.find(a => a.id === accountId);
  if (!acc) return;
  const diff = newBalance - (acc.balance || 0);
  setTxns([{
    id: `correction_${Date.now()}`, title: '잔액 보정', type: diff >= 0 ? 'income' : 'expense',
    amount: Math.abs(diff), currency: acc.currency, accountId, accountName: acc.name,
    category: '기타', payMethod: 'card', memo: '수동 잔액 보정',
    date: new Date().toISOString().split('T')[0],
    rateAtTime: getRate().rate, rateDate: new Date().toISOString().split('T')[0],
    createdAt: new Date().toISOString(), isCorrection: true,
  }, ...getTxns()]);
  setAccounts(accs.map(a => a.id === accountId ? { ...a, balance: newBalance } : a));
};

// ─── exchange rate ────────────────────────────────────────────────────────────
// Frankfurter does NOT support KRW. Using fawazahmed0 currency API instead.
const fetchLatestRate = async () => {
  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json');
    const data = await res.json();
    const rate = data.eur?.krw;
    if (rate) { setRate(rate); return rate; }
    return getRate().rate;
  } catch { return getRate().rate; }
};
const fetchRateForDate = async date => {
  const today = new Date().toISOString().split('T')[0];
  try {
    const dateKey = date >= today ? 'latest' : date;
    const res = await fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${dateKey}/v1/currencies/eur.json`);
    const data = await res.json();
    const rate = data.eur?.krw;
    return { rate: rate || getRate().rate, date };
  } catch { return { rate: getRate().rate, date }; }
};

// ─── fixed cost auto-sync ─────────────────────────────────────────────────────
const shouldApplyFixed = (item, yr, mo) => {
  if (!item.frequency || item.frequency === 'monthly') return true;
  if (item.frequency === 'quarterly') return (mo - (item.startMonth ?? 0) + 12) % 3 === 0;
  if (item.frequency === 'bimonthly') return (mo - (item.startMonth ?? 0) + 12) % 2 === 0;
  if (item.frequency === 'yearly') return mo === (item.startMonth ?? 0);
  return true;
};
const syncFixedCosts = () => {
  const now = new Date(), yr = now.getFullYear(), mo = now.getMonth();
  const synced = ls.get(K.SYNCED) || {};
  const rate = getRate().rate;
  const accs = getAccounts();
  let txns = getTxns(), changed = false;

  // 앱 시작월 — 온보딩 완료 시점. 없으면 현재 달로 기록
  const startData = ls.get(K.START_MONTH) || (() => {
    const d = { year: yr, month: mo };
    ls.set(K.START_MONTH, d);
    return d;
  })();
  const startYear = startData.year, startMo = startData.month;

  const months = [];
  for (let mi = 0; mi < 13; mi++) {
    let y = yr, m = mo - mi;
    while (m < 0) { m += 12; y--; }
    // 앱 시작월 이전은 건너뜀
    if (y < startYear || (y === startYear && m < startMo)) continue;
    const key = `${y}-${m}`;
    if (!synced[key]) months.push({ y, m, key });
  }
  if (!months.length) return;
  for (const { y, m, key } of months) {
    const applyItems = (items, type) => items.forEach(item => {
      if (!shouldApplyFixed(item, y, m)) return;
      const cid = `fixed_${type}_${item.id}_${y}_${m}`;
      if (txns.find(t => t.id === cid)) return;
      const acc = accs.find(a => a.id === item.accountId) || accs.find(a => item.currency === 'KRW' ? a.currency === 'KRW' : a.currency === 'EUR');
      const dd = Math.min(item.day || 1, new Date(y, m + 1, 0).getDate());
      const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;
      txns = [{ id: cid, fixedId: item.id, title: item.name + (item.label ? ` (${item.label})` : ''),
        type, amount: item.amount, currency: item.currency || 'EUR', rateAtTime: rate, rateDate: dateStr,
        accountId: acc?.id || '', accountName: acc?.name || '',
        category: type === 'income' ? '급여' : (item.category || '공과금'), payMethod: 'card',
        memo: `고정 ${type === 'income' ? '수입' : '지출'}`, date: dateStr,
        createdAt: new Date().toISOString() }, ...txns];
      changed = true;
    });
    applyItems(getFixedExp(), 'expense');
    applyItems(getFixedInc(), 'income');
    synced[key] = true;
  }
  if (changed) setTxns(txns);
  ls.set(K.SYNCED, synced);
};

  const [extraCountry, setExtraCountry] = useState('KR');
  const extraNameRef = useRef(), extraBalRef = useRef();

  // Fixed expense state
  const [fixedExpChecks, setFixedExpChecks] = useState(DEFAULT_FIXED_EXP.map(e => ({ ...e, amount: '', day: '', accountId: '' })));
  const [fixedExpExtra, setFixedExpExtra] = useState([]);

  const feNameRef = useRef(), feAmtRef = useRef(), feDayRef = useRef();

  const [fiType, setFiType] = useState('account'); const [fiAccId, setFiAccId] = useState('');
  const fiNameRef = useRef(), fiAmtRef = useRef(), fiDayRef = useRef();

  const buildAccounts = () => {
    const result = [];
    if (krName.trim()) result.push({ id: 'kr-main', name: krName.trim(), country: 'KR', currency: 'KRW', balance: parseComma(krBal) });
    if (deName.trim()) result.push({ id: 'de-main', name: deName.trim(), country: 'DE', currency: 'EUR', balance: parseComma(deBal) });
    extraAccs.forEach(a => result.push({ id: a.id, name: a.name, country: a.country, currency: a.country === 'KR' ? 'KRW' : 'EUR', balance: parseComma(a.balance) }));
    if (parseComma(eurCash) > 0) result.push({ id: 'cash-eur', name: '현금 (EUR)', country: 'DE', currency: 'EUR', balance: parseComma(eurCash), isCash: true });
    if (parseComma(krwCash) > 0) result.push({ id: 'cash-krw', name: '현금 (KRW)', country: 'KR', currency: 'KRW', balance: parseComma(krwCash), isCash: true });

  const addExtra = () => {
    const nm = extraNameRef.current?.value, bal = extraBalRef.current?.value;

    setExtraAccs(prev => [...prev, { id: Date.now().toString(), name: nm.trim(), balance: bal || '0', country: extraCountry }]);
    if (extraNameRef.current) extraNameRef.current.value = '';
    if (extraBalRef.current) extraBalRef.current.value = '';

    if (feNameRef.current) feNameRef.current.value = '';
    if (feAmtRef.current) feAmtRef.current.value = '';
    if (feDayRef.current) feDayRef.current.value = '';

  if (step === 1) return jsx('div', { className: 'app-shell', children: jsx('div', { className: 'page', style: { paddingTop: 20 }, children: jsxs(Fragment, { children: [

      jsxs('div', { style: { flex: 1, paddingLeft: 12 }, children: [jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', marginBottom: 4 }, children: '고정 지출' }), jsx('p', { style: { fontSize: 18, fontWeight: 500 }, children: fmt(totalExp) })] }),
    ] }),
    jsxs('div', { style: { paddingBottom: 16, borderBottom: '0.5px solid var(--gray-100)', marginBottom: 20 }, children: [
      jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', marginBottom: 4 }, children: '예상 잔여금' }),
      jsxs('p', { style: { fontSize: 22, fontWeight: 500 }, children: [totalInc - totalExp >= 0 ? '+' : '', fmt(totalInc - totalExp)] }),
    ] }),
    jsx('p', { className: 'section-title', children: '고정 수입' }),
    addIncOpen && jsx(FixedItemForm, { isIncome: true, onSubmit: v => { if (!v.name.trim()) return; saveInc([...incomes, { id: makeId(), name: v.name.trim(), label: '', amount: parseFloat(v.amount) || 0, day: parseInt(v.day) || 1, currency: v.currency, frequency: v.frequency, accountId: v.accountId, incomeType: v.incomeType }]); setAddIncOpen(false); }, onCancel: () => setAddIncOpen(false), submitLabel: '추가' }),
    jsx('div', { style: { borderTop: '0.5px solid var(--gray-100)', marginBottom: 8 }, children: incomes.length === 0 ? jsx('p', { style: { fontSize: 13, color: 'var(--gray-400)', padding: '12px 0' }, children: '등록된 고정 수입이 없어요' }) :
      sortByDay(incomes).map(item => editIncId === item.id ?
        jsx('div', { key: item.id, style: { padding: '12px 0' }, children: jsx(FixedItemForm, { isIncome: true, initial: item, onSubmit: v => { saveInc(incomes.map(x => x.id === item.id ? { ...x, name: v.name.trim(), amount: parseFloat(v.amount)||0, day: parseInt(v.day)||1, currency: v.currency, frequency: v.frequency, accountId: v.accountId, incomeType: v.incomeType } : x)); setEditIncId(null); }, onCancel: () => setEditIncId(null), submitLabel: '수정 완료' }) }) :
        jsx(FixedItem, { key: item.id, item, isIncome: true, expandedId: expandedIncId, setExpandedId: setExpandedIncId, onEdit: () => { setEditIncId(item.id); setAddIncOpen(false); }, onDelete: () => saveInc(incomes.filter(x => x.id !== item.id)) })
      )
    }),
    jsxs('div', { className: 'add-row', onClick: () => { setAddIncOpen(o => !o); setEditIncId(null); }, children: [jsx('div', { className: 'add-circle', children: '+' }), jsx('span', { style: { fontSize: 13 }, children: '고정 수입 추가' })] }),
    jsx('div', { className: 'divider' }),
    jsx('p', { className: 'section-title', children: '고정 지출' }),
    addExpOpen && jsx(FixedItemForm, { onSubmit: v => { if (!v.name.trim()) return; saveExp([...expenses, { id: makeId(), name: v.name.trim(), label: v.label || '', amount: parseFloat(v.amount)||0, day: parseInt(v.day)||1, currency: v.currency, frequency: v.frequency, category: v.category || '공과금', accountId: v.accountId }]); setAddExpOpen(false); }, onCancel: () => setAddExpOpen(false), submitLabel: '추가' }),
    jsx('div', { style: { borderTop: '0.5px solid var(--gray-100)', marginBottom: 8 }, children: expenses.length === 0 ? jsx('p', { style: { fontSize: 13, color: 'var(--gray-400)', padding: '12px 0' }, children: '등록된 고정 지출이 없어요' }) :
      sortByDay(expenses).map(item => editExpId === item.id ?
        jsx('div', { key: item.id, style: { padding: '12px 0' }, children: jsx(FixedItemForm, { initial: item, onSubmit: v => { saveExp(expenses.map(x => x.id === item.id ? { ...x, name: v.name.trim(), label: v.label||'', amount: parseFloat(v.amount)||0, day: parseInt(v.day)||1, currency: v.currency, frequency: v.frequency, category: v.category || x.category || '공과금', accountId: v.accountId } : x)); setEditExpId(null); }, onCancel: () => setEditExpId(null), submitLabel: '수정 완료' }) }) :
        jsx(FixedItem, { key: item.id, item, isIncome: false, expandedId: expandedExpId, setExpandedId: setExpandedExpId, onEdit: () => { setEditExpId(item.id); setAddExpOpen(false); }, onDelete: () => saveExp(expenses.filter(x => x.id !== item.id)) })
      )
    }),
    jsxs('div', { className: 'add-row', onClick: () => { setAddExpOpen(o => !o); setEditExpId(null); }, children: [jsx('div', { className: 'add-circle', children: '+' }), jsx('span', { style: { fontSize: 13 }, children: '고정 지출 추가' })] }),
    expenses.length > 0 && jsxs(Fragment, { children: [
      jsx('div', { className: 'divider' }),
      jsx('p', { className: 'section-title', children: '지출 비중' }),
      sortByDay(expenses).map(item => jsxs('div', { style: { marginBottom: 12 }, children: [
        jsxs('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: 4 }, children: [jsx('span', { style: { fontSize: 13 }, children: item.name }), jsxs('span', { style: { fontSize: 13, fontWeight: 500 }, children: [fmt(toDisplay(item)), ' · ', (toDisplay(item)/totalExp*100).toFixed(0), '%'] })] }),
        jsx('div', { className: 'bar-track', style: { height: 4 }, children: jsx('div', { className: 'bar-fill', style: { width: `${toDisplay(item)/maxBar*100}%`, height: '100%', borderRadius: 2 } }) }),
      ] }, item.id)),
    ] }),
  ] });
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function SettingsPage({ onClose }) {
  const budgetRef = useRef();
  const b = getBudget();
  const cats = getCategories();
  const [excluded, setExcluded] = useState(b.excludeCategories || ['식비지원금']);
  const toggle = c => setExcluded(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c]);
  return jsx('div', { className: 'app-shell', children: jsx('div', { className: 'page', style: { paddingTop: 16 }, children: jsxs(Fragment, { children: [
    jsxs('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 28 }, children: [jsx('h2', { children: '예산 설정' }), jsx('button', { onClick: onClose, style: { background: 'none', border: 'none', cursor: 'pointer', padding: 0 }, children: jsx(IconX, { size: 20, color: 'var(--gray-400)', sw: 1.5 }) })] }),
    jsx('p', { style: { fontSize: 13, color: 'var(--gray-400)', marginBottom: 24, lineHeight: 1.7 }, children: '월 예산을 설정하면 홈 화면에 이번 달 지출 진행률이 표시돼요. KRW 모드에서도 동일한 예산을 환율로 자동 환산해서 보여줘요.' }),
    jsxs('div', { style: { marginBottom: 28 }, children: [
      jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', marginBottom: 4 }, children: '월 예산 (EUR 기준)' }),
      jsxs('div', { style: { display: 'flex', alignItems: 'center', gap: 6 }, children: [jsx('span', { style: { fontSize: 14, color: 'var(--gray-400)' }, children: '€' }), jsx('input', { ref: budgetRef, className: 'field', type: 'number', placeholder: '설정 안 함', defaultValue: b.eur || '', style: { flex: 1 } })] }),
      jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', marginTop: 6 }, children: 'KRW 모드에서는 현재 환율로 자동 환산돼요' }),
    ] }),
    jsxs('div', { style: { marginBottom: 28 }, children: [
      jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', marginBottom: 10 }, children: '예산에서 제외할 카테고리' }),
      jsx('p', { style: { fontSize: 12, color: 'var(--gray-400)', marginBottom: 12, lineHeight: 1.6 }, children: '체크된 카테고리의 지출은 예산 소진으로 계산되지 않아요' }),
      jsx('div', { style: { display: 'flex', gap: 6, flexWrap: 'wrap' }, children: cats.map(c => jsxs(Pill, { on: excluded.includes(c), onClick: () => toggle(c), style: { fontSize: 11, display: 'inline-flex', alignItems: 'center', gap: 4 }, children: [jsx('span', { style: { display: 'inline-flex', alignItems: 'center' }, children: jsx(CategoryIcon, { cat: c }) }), c] }, c)) }),
    ] }),
    jsx('button', { className: 'btn', onClick: () => { setBudget({ eur: parseFloat(budgetRef.current.value) || null, excludeCategories: excluded }); onClose(); }, children: '저장' }),
    jsx('div', { className: 'divider', style: { margin: '32px 0 16px' } }),
    jsx('p', { className: 'section-title', children: '데이터' }),
    jsx('button', { className: 'btn-ghost', style: { marginTop: 0 }, onClick: exportData, children: '데이터 내보내기 (백업)' }),
    jsx('button', { className: 'btn-ghost', style: { marginTop: 0 }, onClick: exportCSV, children: '엑셀로 내보내기 (CSV)' }),
    jsxs('label', { style: { display: 'block', marginTop: 8 }, children: [
      jsx('input', { type: 'file', accept: '.json', style: { display: 'none' }, onChange: e => e.target.files[0] && importData(e.target.files[0]) }),
      jsx('span', { className: 'btn-ghost', style: { display: 'block', textAlign: 'center', cursor: 'pointer', marginTop: 0 }, children: '데이터 가져오기 (복원)' }),
    ] }),
    jsx('button', { className: 'btn-ghost', style: { marginTop: 0 }, onClick: () => { if (window.confirm('모든 데이터를 초기화할까요? 이 작업은 되돌릴 수 없어요.')) { localStorage.clear(); window.location.reload(); } }, children: '앱 초기화 (전체 데이터 삭제)' }),
    ] }) }) });

    jsx('div', { style: { display: 'flex', gap: 16, justifyContent: 'center', marginTop: 24 }, children: [
      jsx('a', { href: '/datenschutz.html', target: '_blank', style: { fontSize: 12, color: 'var(--gray-400)', textDecoration: 'none', borderBottom: '1px solid var(--gray-200)' }, children: '개인정보처리방침' }),
      jsx('a', { href: '/impressum.html', target: '_blank', style: { fontSize: 12, color: 'var(--gray-400)', textDecoration: 'none', borderBottom: '1px solid var(--gray-200)' }, children: 'Impressum' }),
    ] }),
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function BottomNav({ active, onChange }) {
  const items = [
    { id: 'home', Icon: IconHome, label: '홈' },
    { id: 'history', Icon: IconList, label: '내역' },
    { id: 'add', Icon: null, label: '' },
    { id: 'accounts', Icon: IconWallet, label: '자산' },
    { id: 'fixed', Icon: IconFixed, label: '고정비' },
  ];
  return jsx('nav', { className: 'bottom-nav', children: items.map(item => {
    if (item.id === 'add') return jsx('div', { key: 'add', className: 'nav-plus', onClick: () => onChange('add'), children: jsx(IconPlus, { size: 20, color: 'white' }) });
    const on = active === item.id;
    return jsxs('div', { key: item.id, className: 'nav-item', onClick: () => onChange(item.id), children: [jsx(item.Icon, { size: 20, color: on ? 'var(--black)' : 'var(--gray-400)', sw: on ? 2 : 1.5 }), jsx('span', { className: `nav-label ${on ? 'active' : ''}`, children: item.label })] });
  }) });
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [onboarded, setOnboarded] = useState(null);
  const [tab, setTab] = useState('home');
  const [prevTab, setPrevTab] = useState('home');
  const [editing, setEditing] = useState(null);
  const [settings, setSettings] = useState(false);

  useEffect(() => { setOnboarded(isOnboarded()); }, []);

  if (onboarded === null) return null;
  if (!onboarded) return jsx(Onboarding, { onDone: () => setOnboarded(true) });
  if (settings) return jsx(SettingsPage, { onClose: () => setSettings(false) });
  if (tab === 'add') return jsx('div', { className: 'app-shell', children: jsx(AddTransaction, { editing, onDone: () => { setEditing(null); setTab(prevTab); } }) });

  return jsxs('div', { className: 'app-shell', children: [
    tab === 'home'     && jsx(HomeTab,     { onOpenSettings: () => setSettings(true) }),
    tab === 'history'  && jsx(HistoryTab,  { onEdit: t => { setEditing(t); setPrevTab(tab); setTab('add'); } }),
    tab === 'accounts' && jsx(AccountsTab, {}),
    tab === 'fixed'    && jsx(FixedTab,    {}),
    jsx(BottomNav, { active: tab, onChange: t => { if (t === 'add') { setEditing(null); setPrevTab(tab); setTab('add'); } else setTab(t); } }),
  ] });
}

createRoot(document.getElementById('root')).render(jsx(StrictMode, { children: jsx(App, {}) }));

// ─── Service Worker 등록 ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/money/service-worker.js', { scope: '/money/' })
      .then(reg => console.log('[SW] 등록 완료:', reg.scope))
      .catch(err => console.warn('[SW] 등록 실패:', err));
  });
}
</script>
