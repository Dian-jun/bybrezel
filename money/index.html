<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Brezel Money</title>

<!-- PWA -->
<link rel="manifest" href="/money/manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="교민가계부"/>
<meta name="theme-color" content="#111111"/>
<link rel="apple-touch-icon" href="/money/icons/icon-192.png"/>
<style>
@import "https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap";
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#111;--white:#fff;
  --gray-50:#f8f8f8;--gray-100:#f0f0f0;--gray-200:#e0e0e0;--gray-400:#999;--gray-600:#555;
  --accent:#FF7A50;
  --font:"DM Sans",sans-serif;--mono:"DM Mono",monospace;
  --radius:14px;--radius-sm:8px;
}
html,body,#root{background:var(--white);width:100%;height:100%;font-family:var(--font);color:var(--black);-webkit-font-smoothing:antialiased}
#root{background:var(--gray-50);justify-content:center;display:flex}
.app-shell{background:var(--white);flex-direction:column;width:100%;max-width:430px;min-height:100%;display:flex;position:relative}
h1{font-size:26px;font-weight:500;line-height:1.2}
h2{font-size:20px;font-weight:500}
p{line-height:1.6}
.text-muted{color:var(--gray-400);font-size:12px}
.page{flex:1;padding:16px 20px 100px;overflow-y:auto}
.section{margin-bottom:28px}
.section-title{letter-spacing:.8px;text-transform:uppercase;color:var(--gray-400);margin-bottom:12px;font-size:11px;font-weight:500}
.divider{background:var(--gray-200);height:.5px;margin:18px 0}
.row{border-bottom:.5px solid var(--gray-100);justify-content:space-between;align-items:center;padding:12px 0;display:flex}
.row:last-child{border-bottom:none}
.field{border:none;border-bottom:1px solid var(--gray-200);color:var(--black);width:100%;font-size:14px;font-family:var(--font);background:transparent;outline:none;padding:6px 0;transition:border-color .2s}
.field:focus{border-color:var(--black)}
.field::placeholder{color:var(--gray-400)}
.field-sm{border:none;border-bottom:1px solid var(--gray-200);color:var(--black);text-align:center;width:36px;font-size:13px;font-family:var(--font);background:transparent;outline:none;padding:2px 0}
.field-amt{border:none;border-bottom:1px solid var(--gray-200);color:var(--black);text-align:right;width:72px;font-size:13px;font-family:var(--font);background:transparent;outline:none;padding:2px 0}
.field-amt::placeholder,.field-sm::placeholder{color:var(--gray-400)}
.btn{background:var(--black);width:100%;color:var(--white);border-radius:var(--radius);font-size:15px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;padding:15px;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-ghost{width:100%;color:var(--gray-400);border:.5px solid var(--gray-200);border-radius:var(--radius);font-size:14px;font-family:var(--font);cursor:pointer;background:transparent;margin-top:8px;padding:13px}
.btn-sm{background:var(--black);color:var(--white);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;border-radius:20px;padding:5px 14px}
.btn-sm-outline{color:var(--gray-600);border:.5px solid var(--gray-200);font-size:12px;font-family:var(--font);cursor:pointer;background:transparent;border-radius:20px;padding:5px 14px}
.toggle-wrap{background:var(--gray-100);border-radius:20px;gap:2px;padding:3px;display:flex}
.toggle-btn{cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font);border:none;border-radius:16px;padding:4px 14px;transition:all .15s}
.toggle-btn.active{background:var(--black);color:var(--white)}
.toggle-btn.inactive{color:var(--gray-400);background:transparent}
.check-on{background:var(--black);cursor:pointer;border-radius:4px;flex-shrink:0;justify-content:center;align-items:center;width:18px;height:18px;display:flex}
.check-off{border:1px solid var(--gray-200);cursor:pointer;border-radius:4px;flex-shrink:0;width:18px;height:18px}
.progress-bar{gap:4px;margin-bottom:24px;display:flex}
.progress-bar span{border-radius:2px;flex:1;height:2px}
.progress-bar span.on{background:var(--black)}
.progress-bar span.off{background:var(--gray-200)}
.bottom-nav{background:var(--white);border-top:.5px solid var(--gray-100);z-index:100;justify-content:space-around;align-items:center;width:100%;max-width:430px;padding:10px 0 20px;display:flex;position:fixed;bottom:0;left:50%;transform:translate(-50%)}
.nav-item{cursor:pointer;flex-direction:column;align-items:center;gap:4px;min-width:52px;display:flex}
.nav-label{color:var(--gray-400);font-size:10px}
.nav-label.active{color:var(--black);font-weight:500}
.nav-plus{background:var(--black);cursor:pointer;border-radius:50%;justify-content:center;align-items:center;width:44px;height:44px;display:flex}
.card{background:var(--gray-50);border-radius:var(--radius);margin-bottom:12px;padding:16px}
.add-row{cursor:pointer;color:var(--gray-400);align-items:center;gap:10px;padding:12px 0;display:flex}
.add-circle{border:1px solid var(--gray-200);width:22px;height:22px;color:var(--gray-400);border-radius:50%;justify-content:center;align-items:center;font-size:14px;display:flex}
.parse-result{flex-wrap:wrap;gap:6px;margin-top:10px;display:flex}
.parse-tag{border:.5px solid var(--gray-200);color:var(--gray-600);border-radius:12px;padding:3px 10px;font-size:11px}
.parse-tag.primary{background:var(--black);color:var(--white);border-color:var(--black)}
.pill-on{background:var(--black);color:var(--white);cursor:pointer;font-size:12px;font-family:var(--font);border:none;border-radius:14px;padding:4px 12px}
.pill-off{color:var(--gray-400);border:.5px solid var(--gray-200);cursor:pointer;font-size:12px;font-family:var(--font);background:transparent;border-radius:14px;padding:4px 12px}
.bar-track{background:var(--gray-100);border-radius:2px;height:3px;margin-top:8px}
.bar-fill{background:var(--black);border-radius:2px;height:100%}
/* 펼침 애니메이션 */
.expand-enter{animation:.2s ease forwards expandIn}
@keyframes expandIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:.25s forwards fadeIn}

/* 업데이트 배너 슬라이드 */
@keyframes bannerIn{
  from{opacity:0;transform:translateY(-10px);max-height:0;margin-bottom:0;padding-top:0;padding-bottom:0}
  to  {opacity:1;transform:translateY(0);max-height:80px;margin-bottom:14px;padding-top:11px;padding-bottom:11px}
}
@keyframes bannerOut{
  from{opacity:1;transform:translateY(0);max-height:80px;margin-bottom:14px;padding-top:11px;padding-bottom:11px}
  to  {opacity:0;transform:translateY(-10px);max-height:0;margin-bottom:0;padding-top:0;padding-bottom:0}
}
.banner-enter{animation:.3s cubic-bezier(.4,0,.2,1) forwards bannerIn;overflow:hidden}
.banner-exit {animation:.25s cubic-bezier(.4,0,.2,1) forwards bannerOut;overflow:hidden;pointer-events:none}

/* ── layout utilities ───────────────────────────────────── */
.flex-row        {display:flex;flex-direction:row}
.flex-col        {display:flex;flex-direction:column}
.flex-center     {display:flex;align-items:center}
.flex-between    {display:flex;justify-content:space-between;align-items:center}
.flex-end        {display:flex;justify-content:flex-end}
.flex-wrap       {flex-wrap:wrap}
.gap-4           {gap:4px}
.gap-6           {gap:6px}
.gap-8           {gap:8px}
.gap-10          {gap:10px}
.gap-12          {gap:12px}
.mb-4            {margin-bottom:4px}
.mb-6            {margin-bottom:6px}
.mb-8            {margin-bottom:8px}
.mb-10           {margin-bottom:10px}
.mb-12           {margin-bottom:12px}
.mb-14           {margin-bottom:14px}
.mb-16           {margin-bottom:16px}
.mb-20           {margin-bottom:20px}
.mb-24           {margin-bottom:24px}
.mb-28           {margin-bottom:28px}
.mt-8            {margin-top:8px}
.mt-12           {margin-top:12px}
.w-full          {width:100%}
.flex-1          {flex:1}
.text-right      {text-align:right}

/* ── text utilities ─────────────────────────────────────── */
.text-11         {font-size:11px}
.text-12         {font-size:12px}
.text-13         {font-size:13px}
.text-14         {font-size:14px}
.fw-500          {font-weight:500}
.color-muted     {color:var(--gray-400)}
.color-mid       {color:var(--gray-600)}
.color-accent    {color:var(--accent)}

/* ── border/divider ─────────────────────────────────────── */
.border-top      {border-top:.5px solid var(--gray-100)}
.border-bottom   {border-bottom:.5px solid var(--gray-100)}
.vdivider        {width:.5px;background:var(--gray-200)}

/* ── card-like panels ───────────────────────────────────── */
.panel           {background:var(--gray-50);border-radius:12px;padding:14px}
.panel-outlined  {border:.5px solid var(--gray-100);border-radius:12px;padding:12px}

/* ── back button ────────────────────────────────────────── */
.btn-back        {background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;color:var(--gray-400);font-size:13px;padding:0;font-family:var(--font)}
.btn-icon        {background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center}

/* ── nav header row ─────────────────────────────────────── */
.page-header     {display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.page-header-lg  {display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}

/* ── inline label ───────────────────────────────────────── */
.field-label     {font-size:11px;color:var(--gray-400);margin-bottom:4px}

/* ── currency toggle (shared pattern) ──────────────────── */
.cur-toggle      {display:flex;align-items:center;gap:8px}

/* ── amount row (symbol + input) ────────────────────────── */
.amt-row         {display:flex;align-items:center;gap:6px}

/* ── auth page ──────────────────────────────────────────── */
.auth-shell{display:flex;flex-direction:column;justify-content:space-between;min-height:100%;padding:60px 28px 48px;background:var(--white)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:40px}
.auth-title{font-size:24px;font-weight:500;line-height:1.3;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--gray-600);margin-bottom:36px;line-height:1.7}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:.5px;background:var(--gray-200)}
.auth-divider span{font-size:11px;color:var(--gray-400)}
.auth-error{font-size:12px;color:#C04B1E;margin-top:8px;min-height:18px}
.auth-switch{font-size:13px;color:var(--gray-400);text-align:center;margin-top:16px}
.auth-switch span{color:var(--black);cursor:pointer;border-bottom:1px solid var(--gray-200)}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;border:.5px solid var(--gray-200);border-radius:var(--radius);background:var(--white);font-size:14px;font-family:var(--font);cursor:pointer;padding:14px;transition:background .15s}
.btn-google:hover{background:var(--gray-50)}
.field-wrap{margin-bottom:14px}
.field-wrap label{display:block;font-size:11px;color:var(--gray-400);margin-bottom:4px}
</style>
</head>

const formatRate = (rate) => {
  const n = Number(rate);
  if (!Number.isFinite(n)) return '0.00';
  return n.toLocaleString('ko-KR', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
};

const roundRate2 = v => {
  const n = Number(v);
  return Number.isFinite(n) ? Math.round(n * 100) / 100 : 0;
};
const roundEur2 = v => {
  const n = Number(v);
  return Number.isFinite(n) ? Math.round(n * 100) / 100 : 0;
};
const roundKrw0 = v => {
  const n = Number(v);
  return Number.isFinite(n) ? Math.round(n) : 0;
};
const normalizeRate = rate => roundRate2(rate || getRate().rate);
const convertByRate = (amount, fromCurrency, toCurrency, rate) => {
  const a = Number(amount);
  if (!Number.isFinite(a)) return 0;
  if (fromCurrency === toCurrency) return a;
  const r = normalizeRate(rate);
  if (!Number.isFinite(r) || r <= 0) return 0;
  if (fromCurrency === 'EUR' && toCurrency === 'KRW') return roundKrw0(a * r);
  if (fromCurrency === 'KRW' && toCurrency === 'EUR') return roundEur2(a / r);
  return a;
};

const setRate       = (v, date = null) => ls.set(BASE_KEYS.RATE, { rate: roundRate2(v), date, updatedAt: new Date().toISOString() });

// camelCase(앱) ↔ snake_case(DB) 변환 헬퍼
const toSnake = obj => {
  const map = {
    accountId:'account_id', accountName:'account_name',
    fromAccountId:'from_account_id', fromAccountName:'from_account_name',
    fromAmount:'from_amount', fromCurrency:'from_currency',
    toAccountId:'to_account_id', toAccountName:'to_account_name',
    toAmount:'to_amount', toCurrency:'to_currency',
    feeCurrency:'fee_currency', transferId:'transfer_id',
    rateAtTime:'rate_at_time', rateDate:'rate_date',
    payMethod:'pay_method', fixedId:'fixed_id',
    isCorrection:'is_correction', createdAt:'created_at',
    initialBalance:'initial_balance', isCash:'is_cash',
    incomeType:'income_type', startMonth:'start_month',
    syncedMonths:'synced_months', budgetEur:'budget_eur',
    excludeCategories:'exclude_categories', rateUpdatedAt:'rate_updated_at',
    rateDate:'rate_date',
  };
  return Object.fromEntries(
    Object.entries(obj).map(([k, v]) => [map[k] || k, v])
  );
};
const toCamel = obj => {
  const map = {
    account_id:'accountId', account_name:'accountName',
    from_account_id:'fromAccountId', from_account_name:'fromAccountName',
    from_amount:'fromAmount', from_currency:'fromCurrency',
    to_account_id:'toAccountId', to_account_name:'toAccountName',
    to_amount:'toAmount', to_currency:'toCurrency',
    fee_currency:'feeCurrency', transfer_id:'transferId',
    rate_at_time:'rateAtTime', rate_date:'rateDate',
    pay_method:'payMethod', fixed_id:'fixedId',
    is_correction:'isCorrection', created_at:'createdAt',
    initial_balance:'initialBalance', is_cash:'isCash',
    income_type:'incomeType', start_month:'startMonth',
    synced_months:'syncedMonths', budget_eur:'budgetEur',
    exclude_categories:'excludeCategories', rate_updated_at:'rateUpdatedAt',
    user_id:'userId',
  };
  return Object.fromEntries(
    Object.entries(obj)
      .filter(([k]) => k !== 'user_id')   // userId는 앱에서 불필요
      .map(([k, v]) => [map[k] || k, v])
  );
};

const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

const waitForSession = async (timeout = 6000) => {
  const started = Date.now();

  while (Date.now() - started < timeout) {
    const { data, error } = await supabase.auth.getSession();
    if (error) console.error('[AUTH] getSession 오류:', error);

    const session = data?.session;
    if (session?.access_token && session?.user?.id) return session;

    await wait(150);
  }

  throw new Error('세션이 아직 준비되지 않았습니다.');
};

const loadDbSnapshot = async (uid) => {
  const [accsRes, txnsRes, fixExpRes, fixIncRes, settRes] = await Promise.all([
    supabase.from('accounts').select('*').eq('user_id', uid),
    supabase.from('transactions').select('*').eq('user_id', uid),
    supabase.from('fixed_expenses').select('*').eq('user_id', uid),
    supabase.from('fixed_incomes').select('*').eq('user_id', uid),
    supabase.from('user_settings').select('*').eq('user_id', uid).maybeSingle(),
  ]);
  return {
    accounts: normalizeAccounts((accsRes.data || []).map(toCamel)),
    txns: (txnsRes.data || []).map(toCamel),
    fixedExp: (fixExpRes.data || []).map(toCamel),
    fixedInc: (fixIncRes.data || []).map(toCamel),
    settings: settRes.data || null,
    errors: [accsRes.error, txnsRes.error, fixExpRes.error, fixIncRes.error, settRes.error].filter(Boolean),
  };
};
const hasAnyAppData = (dataset) =>

  !!dataset.settings;
const shouldConfirmDestructiveSave = (remote, local) => (
  ((remote.accounts?.length || 0) > 0 && (local.accounts?.length || 0) === 0) ||
  ((remote.txns?.length || 0) > 0 && (local.txns?.length || 0) === 0) ||
  ((remote.fixedExp?.length || 0) > 0 && (local.fixedExp?.length || 0) === 0) ||
  ((remote.fixedInc?.length || 0) > 0 && (local.fixedInc?.length || 0) === 0)
);
const syncCollectionTable = async ({ table, rows, uid }) => {
  const { data: remoteRows, error: loadErr } = await supabase.from(table).select('id').eq('user_id', uid);
  if (loadErr) throw loadErr;
  const remoteIds = new Set((remoteRows || []).map(r => r.id));
  const localIds = new Set((rows || []).map(r => r.id));
  const toDelete = [...remoteIds].filter(id => !localIds.has(id));
  if (toDelete.length) {
    const { error } = await supabase.from(table).delete().eq('user_id', uid).in('id', toDelete);
    if (error) throw error;
  }
  if (rows?.length) {
    const { error } = await supabase.from(table).upsert(rows, { onConflict: 'id,user_id' });
    if (error) throw error;
  }
};
const dbSaveAccounts = async (accounts, options = {}) => {

const dbSaveAll = async (options = {}) => {
  const uid = await getCurrentUserId();
  const opId = makeOpId('saveall');
  const dataset = options.dataset || getCurrentDataset();
  log.group('SYNC', `${opId} dbSaveAll`);
  log.info('SYNC', `${opId} local snapshot`, summarizeDataset(dataset));
  setSyncStatusGlobal('syncing', options.reason || '동기화 중');
  try {
    if (!uid) {
      applyDatasetToLocal(dataset);
      setSyncStatusGlobal('success', '비로그인 로컬 저장 완료');
      return true;
    }
    const remote = await loadDbSnapshot(uid);
    log.info('SYNC', `${opId} remote snapshot`, summarizeDataset(remote));
    if (remote.errors?.length) throw remote.errors[0];
    if (!options.allowDestructive && shouldConfirmDestructiveSave(remote, dataset)) {
      const ok = window.confirm('기존 데이터 일부 또는 전체가 삭제됩니다. 정말 저장할까요?');
      if (!ok) {
        setSyncStatusGlobal('idle', '저장 취소');
        return false;
      }
    }
    applyDatasetToLocal(dataset);
    await dbSaveAccounts(dataset.accounts || [], { localOnly: true });
    await dbSaveTxns(dataset.txns || [], { localOnly: true });
    await dbSaveFixedExp(dataset.fixedExp || [], { localOnly: true });
    await dbSaveFixedInc(dataset.fixedInc || [], { localOnly: true });
    await syncCollectionTable({ table: 'accounts', rows: (dataset.accounts || []).map(a => ({ ...toSnake((({ balance, initial_balance, ...rest }) => rest)(a || {})), user_id: uid })), uid });
    await syncCollectionTable({ table: 'transactions', rows: (dataset.txns || []).map(t => ({ ...toSnake(t), user_id: uid })), uid });
    await syncCollectionTable({ table: 'fixed_expenses', rows: (dataset.fixedExp || []).map(i => ({ ...toSnake(i), user_id: uid })), uid });
    await syncCollectionTable({ table: 'fixed_incomes', rows: (dataset.fixedInc || []).map(i => ({ ...toSnake(i), user_id: uid })), uid });
    await dbSaveSettings();
    await dbLoadAll();
    setSyncStatusGlobal('success', options.reason || '동기화 완료');
    log.info('SYNC', `${opId} 완료`);
    return true;
  } catch (e) {
    setSyncStatusGlobal('error', e?.message || '동기화 실패');
    log.error('SYNC', `${opId} 실패`, e);
    throw e;
  } finally {
    log.groupEnd();
  }
};

const dbLoadAll = async () => {
  const uid = await getCurrentUserId();
  if (!uid) return false;
  const snapshot = await loadDbSnapshot(uid);
  if (snapshot.errors?.length) {
    log.error('DB', 'load 오류', snapshot.errors[0]);
    throw snapshot.errors[0];
  }
  setAccounts(snapshot.accounts || []);
  setTxns((snapshot.txns || []).sort((a, b) => String(b.date || '').localeCompare(String(a.date || ''))));
  setFixedExp(snapshot.fixedExp || []);
  setFixedInc(snapshot.fixedInc || []);
  const s = snapshot.settings;
  log.info('DB', 'load 완료', {
    accounts: snapshot.accounts?.length || 0,
    txns: snapshot.txns?.length || 0,
    fixedExp: snapshot.fixedExp?.length || 0,
    fixedInc: snapshot.fixedInc?.length || 0,
    hasSettings: !!s,
  });
  if (s) {
    if (s.rate) setRate(roundRate2(s.rate), s.rate_date || null);
    ls.set(BASE_KEYS.BUDGET, { eur: s.budget_eur, excludeCategories: s.exclude_categories || ['식비지원금'] });
    if (s.categories) setCategories(s.categories);
    if (s.synced_months) ls.set(BASE_KEYS.SYNCED, s.synced_months);
    if (s.start_month) ls.set(BASE_KEYS.START_MONTH, s.start_month);
  }
  if (hasAnyAppData(snapshot)) markOnboarded();
  return true;
};

const migrateGuestToCurrentUserSafely = async (uid) => {
  if (!uid) throw new Error('uid 없음');
  const opId = `safe-import:${uid}`;
  log.group('GUEST', opId);
  try {
    const firstLogin = await isFirstAppLogin(uid);
    if (!firstLogin) {
      log.warn('GUEST', '첫 로그인 아님 — import 차단');
      return false;
    }
    if (getMigrationDone(uid)) {
      log.warn('GUEST', '이미 import 완료됨');
      return false;
    }
    const guest = getGuestDataset();
    log.info('GUEST', 'guest snapshot', summarizeDataset(guest));
    if (!hasAnyAppData(guest)) {
      log.warn('GUEST', 'guest 데이터 없음');
      return false;

    setTxns([feeEntry, t, ...txns]);
    return t;
  }
  setTxns([t, ...txns]);
  return t;
};
// ─── 수수료 항목 동기화 헬퍼 ─────────────────────────────────────────────────
// transfer 수정 시 수수료 내역(t_fee_*)을 일관되게 업데이트/삭제한다.
const syncFeeEntry = (txns, parentId, patch) => {
  const feeId = `t_fee_${parentId}`;
  const hasFee = txns.some(t => t.id === feeId);
  if (patch.fee > 0) {
    const updated = {
      id: feeId, transferId: parentId,
      title: `${patch.title || '송금'} 수수료`,
      type: 'expense', amount: patch.fee,
      currency: patch.feeCurrency || patch.fromCurrency,
      accountId: patch.fromAccountId, accountName: patch.fromAccountName || '',
      category: '송금', payMethod: 'card', memo: '수수료',
      date: patch.date, rateAtTime: patch.rateAtTime, rateDate: patch.rateDate,
      createdAt: new Date().toISOString(),
    };
    if (hasFee) return txns.map(t => t.id === parentId ? { ...t, ...patch } : t.id === feeId ? updated : t);
    return [updated, ...txns.map(t => t.id === parentId ? { ...t, ...patch } : t)];
  }
  // fee가 0 이하: 기존 수수료 내역 제거
  return txns.filter(t => t.id !== feeId).map(t => t.id === parentId ? { ...t, ...patch } : t);
};

const updateTxn = (id, patch) => {
  const txns = getTxns();
  if (patch.type === 'transfer' && patch.fee !== undefined) {
    setTxns(syncFeeEntry(txns, id, patch));
    return;
  }
  setTxns(txns.map(t => t.id === id ? { ...t, ...patch } : t));
};
const deleteTxn = id => {
  const txns = getTxns();
  // transfer 수수료 내역도 같이 삭제
  setTxns(txns.filter(t => t.id !== id && t.transferId !== id));
};

// ─── 방식 B: 내역 기반 잔액 계산 ─────────────────────────────────────────────
const calcBalance = (accountId, untilDate = null) => {
  const acc = getAccounts().find(a => a.id === accountId);
  if (!acc) return 0;
  const base = acc.initialBalance ?? acc.balance ?? 0;
  const txns = getTxns().filter(t => !untilDate || t.date <= untilDate);
  let delta = 0;
  txns.forEach(t => {
    if (t.type === 'transfer') {
      if (t.fromAccountId === accountId) delta -= (t.fromAmount || 0);
      if (t.toAccountId === accountId) delta += (t.toAmount || 0);
    } else if (t.type === 'income' && t.accountId === accountId) {
      delta += (t.amount || 0);
    } else if (t.type === 'expense' && t.accountId === accountId) {
      delta -= (t.amount || 0);
    }
  });
  return base + delta;
};

const correctBalance = (accountId, newBalance) => {
  const acc = getAccounts().find(a => a.id === accountId);
  if (!acc) return;
  const current = calcBalance(accountId);
  const diff = newBalance - current;
  const entry = {
    id: `correction_${Date.now()}`, title: '잔액 보정',
    type: diff >= 0 ? 'income' : 'expense',
    amount: Math.abs(diff), currency: acc.currency,
    accountId, accountName: acc.name,
    category: '기타', payMethod: 'card', memo: '수동 잔액 보정',
    date: new Date().toISOString().split('T')[0],
    rateAtTime: normalizeRate(getRate().rate), rateDate: new Date().toISOString().split('T')[0],
    createdAt: new Date().toISOString(), isCorrection: true,
  };
  setTxns([entry, ...getTxns()]);
};

// ─── fixed cost auto-sync ─────────────────────────────────────────────────────
const shouldApplyFixed = (item, yr, mo) => {
  if (!item.frequency || item.frequency === 'monthly') return true;
  if (item.frequency === 'quarterly') return (mo - (item.startMonth ?? 0) + 12) % 3 === 0;
  if (item.frequency === 'bimonthly') return (mo - (item.startMonth ?? 0) + 12) % 2 === 0;
  if (item.frequency === 'yearly') return mo === (item.startMonth ?? 0);
  return true;
};
const syncFixedCosts = () => {
  const now = new Date(), yr = now.getFullYear(), mo = now.getMonth();
  const synced = ls.get(BASE_KEYS.SYNCED) || {};
  const rate = normalizeRate(getRate().rate);
  const accs = getAccounts();
  let txns = getTxns(), changed = false;

  // 앱 시작월 — 온보딩 완료 시점. 없으면 현재 달로 기록
  const startData = ls.get(BASE_KEYS.START_MONTH) || (() => {
    const d = { year: yr, month: mo };
    ls.set(BASE_KEYS.START_MONTH, d);
    return d;
  })();
  const startYear = startData.year, startMo = startData.month;

  const months = [];
  for (let mi = 0; mi < 13; mi++) {
    let y = yr, m = mo - mi;
    while (m < 0) { m += 12; y--; }
    // 앱 시작월 이전은 건너뜀
    if (y < startYear || (y === startYear && m < startMo)) continue;
    const key = `${y}-${m}`;
    if (!synced[key]) months.push({ y, m, key });
  }
  if (!months.length) return;
  for (const { y, m, key } of months) {
    const applyItems = (items, type) => items.forEach(item => {
      if (!shouldApplyFixed(item, y, m)) return;
      const cid = `fixed_${type}_${item.id}_${y}_${m}`;
      if (txns.find(t => t.id === cid)) return;
      const acc = accs.find(a => a.id === item.accountId) || accs.find(a => item.currency === 'KRW' ? a.currency === 'KRW' : a.currency === 'EUR');
      const dd = Math.min(item.day || 1, new Date(y, m + 1, 0).getDate());
      const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;
      txns = [{ id: cid, fixedId: item.id, title: item.name + (item.label ? ` (${item.label})` : ''),
        type, amount: item.amount, currency: item.currency || 'EUR', rateAtTime: rate, rateDate: dateStr,
        accountId: acc?.id || '', accountName: acc?.name || '',
        category: type === 'income' ? '급여' : (item.category || '공과금'), payMethod: 'card',
        memo: `고정 ${type === 'income' ? '수입' : '지출'}`, date: dateStr,
        createdAt: new Date().toISOString() }, ...txns];
      changed = true;
    });
    applyItems(getFixedExp(), 'expense');
    applyItems(getFixedInc(), 'income');
    synced[key] = true;
  }
  if (changed) setTxns(txns);
  ls.set(BASE_KEYS.SYNCED, synced);
};

// 자연어 날짜 표현 → YYYY-MM-DD 변환 (한국어 기준)
// 예: '어제', '3일 전', '지난주 월요일', '4/12', '4월 12일'
const parseRelativeDate = (text) => {
  const today = new Date();
  const t = text;
  const isoOf = d => d.toISOString().split('T')[0];
  const shift = n => { const d = new Date(today); d.setDate(d.getDate() + n); return isoOf(d); };

  if (/어제/.test(t)) return shift(-1);
  if (/그저께|그제/.test(t)) return shift(-2);

  const daysAgo = t.match(/(\d+)일\s*전/);
  if (daysAgo) return shift(-parseInt(daysAgo[1]));

  const DAY_MAP = { '일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6 };

  const lastWeekDay = t.match(/지난\s*주?\s*(월|화|수|목|금|토|일)요일/);
  if (lastWeekDay) {
    const target = DAY_MAP[lastWeekDay[1]];
    const dayDiff = (today.getDay() - target + 7) % 7;
    return shift(-(dayDiff === 0 ? 7 : dayDiff) - 7);
  }

  const thisWeekDay = t.match(/이번\s*주?\s*(월|화|수|목|금|토|일)요일/);
  if (thisWeekDay) {
    const target = DAY_MAP[thisWeekDay[1]];
    return shift(-((today.getDay() - target + 7) % 7));
  }

  const yr = today.getFullYear();
  const mdSlash = t.match(/(\d{1,2})\/(\d{1,2})/);
  if (mdSlash) return `${yr}-${String(mdSlash[1]).padStart(2,'0')}-${String(mdSlash[2]).padStart(2,'0')}`;
  const mdKor = t.match(/(\d{1,2})월\s*(\d{1,2})일/);
  if (mdKor) return `${yr}-${String(mdKor[1]).padStart(2,'0')}-${String(mdKor[2]).padStart(2,'0')}`;

  return null; // 날짜 표현 없음 → 오늘
};

  if (regionA !== regionB) return regionA - regionB;
  return (a.isCash ? 1 : 0) - (b.isCash ? 1 : 0);

const Pill = ({ on, onClick, children, style }) =>
  jsx('button', { className: on ? 'pill-on' : 'pill-off', onClick, style, children });

const fmtAmount = (raw, currency) => {
  // 소수점 분리
  const parts = raw.split('.');
  const intPart = parts[0].replace(/\D/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  if (currency === 'KRW') return intPart; // 원화는 소수점 없음
  return parts.length > 1 ? intPart + '.' + parts[1].replace(/\D/g, '').slice(0, 2) : intPart;
};

// 독일식 콤마 소수점 처리 포함 금액 입력 onChange 핸들러 팩토리
const makeAmountHandler = (currency, onChange) => e => {
  let raw = e.target.value.replace(/,/g, '');
  // 독일 키보드: 마지막에 입력된 콤마를 소수점으로 처리
  if (e.target.value.slice(-1) === ',') raw = e.target.value.slice(0, -1).replace(/,/g, '') + '.';
  raw = raw.replace(/[^\d.]/g, '').replace(/\.(?=.*\.)/g, '');
  if (currency === 'KRW') raw = raw.replace(/\./g, ''); // 원화는 소수점 제거
  if (raw === '' || /^\d*\.?\d{0,2}$/.test(raw)) onChange(fmtAmount(raw, currency));
};

// variant='sm'  → field-amt (작은 인라인 입력)

      setLoading(false);
      if (error) { setErr('이메일 발송에 실패했어요. 다시 시도해주세요.'); return; }
      setMsg('비밀번호 재설정 링크를 보냈어요. 이메일을 확인해주세요!');
      return;
    }

    if (!pw) { setErr('비밀번호를 입력해주세요.'); return; }
    if (mode === 'signup' && pw !== pw2) { setErr('비밀번호가 일치하지 않아요.'); return; }
    if (pw.length < 6) { setErr('비밀번호는 6자 이상이어야 해요.'); return; }
    setLoading(true);
    if (mode === 'login') {
      const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
      if (error) { setErr('이메일 또는 비밀번호가 올바르지 않아요.'); setLoading(false); return; }
    } else {
      const { error } = await supabase.auth.signUp({ email, password: pw });
      if (error) { setErr('회원가입에 실패했어요: ' + error.message); setLoading(false); return; }
      setMsg('가입 확인 이메일을 보냈어요. 이메일을 확인해주세요!');
      setLoading(false); return;
    }
    setLoading(false);
    onAuth();
  };

  const googleLogin = async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href },
    });
  };

  const switchMode = (next) => { setMode(next); setErr(''); setMsg(''); };

  const titles = { login: '다시 돌아오셨군요 👋', signup: '계정을 만들어볼게요', reset: '비밀번호를 재설정할게요' };
  const subs   = { login: '로그인하면 모든 기기에서\n데이터가 동기화돼요.', signup: '가입하면 데이터가 안전하게\n클라우드에 저장돼요.', reset: '가입한 이메일 주소를 입력하면\n재설정 링크를 보내드려요.' };
  const btnLabels = { login: '로그인', signup: '가입하기', reset: '재설정 링크 보내기' };

  return jsx('div', { className: 'app-shell', children:
    jsxs('div', { className: 'auth-shell', children: [
      jsxs('div', { children: [
        jsxs('div', { className: 'auth-logo', children: [
          jsx('img', { src: '/money/icons/icon-192.png', style: { width: 36, height: 36, borderRadius: 10 } }),
          jsxs('p', { style: { fontSize: 16, fontWeight: 600, letterSpacing: '-0.3px' },
            children: ['Brezel ', jsx('span', { style: { fontWeight: 300 }, children: 'Money' })] }),
          onClose && jsx('button', { className: 'btn-icon', onClick: onClose,
            style: { marginLeft: 'auto', color: 'var(--gray-400)', fontSize: 13 },
            children: '← 돌아가기' }),
        ] }),
        jsx('h1', { className: 'auth-title', children: titles[mode] }),
        jsx('p', { className: 'auth-sub', children: subs[mode] }),

        // 구글 로그인 (reset 모드에서는 숨김)
        mode !== 'reset' && jsxs(Fragment, { children: [
          jsxs('button', { className: 'btn-google', onClick: googleLogin, children: [
            jsx('svg', { width: 18, height: 18, viewBox: '0 0 48 48', children: [
              jsx('path', { fill: '#EA4335', d: 'M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z' }),
              jsx('path', { fill: '#4285F4', d: 'M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z' }),
              jsx('path', { fill: '#FBBC05', d: 'M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z' }),
              jsx('path', { fill: '#34A853', d: 'M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z' }),
            ] }),
            mode === 'login' ? 'Google로 로그인' : 'Google로 가입',
          ] }),
          jsxs('div', { className: 'auth-divider', children: [jsx('span', { children: '또는' })] }),
        ] }),

        // 이메일 입력
        jsxs('div', { className: 'field-wrap', children: [
          jsx('label', { children: '이메일' }),
          jsx('input', { className: 'field', type: 'email', placeholder: 'you@example.com',
            value: email, onChange: e => setEmail(e.target.value),
            onKeyDown: e => e.key === 'Enter' && submit() }),
        ] }),

        // 비밀번호 (reset 모드에서는 숨김)
        mode !== 'reset' && jsxs('div', { className: 'field-wrap', children: [
          jsxs('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }, children: [
            jsx('label', { style: { marginBottom: 0 }, children: '비밀번호' }),
            mode === 'login' && jsx('span', {
              onClick: () => switchMode('reset'),
              style: { fontSize: 11, color: 'var(--gray-400)', cursor: 'pointer', borderBottom: '1px solid var(--gray-200)' },
              children: '비밀번호를 잊으셨나요?',
            }),
          ] }),
          jsx('input', { className: 'field', type: 'password', placeholder: '6자 이상',
            value: pw, onChange: e => setPw(e.target.value),
            onKeyDown: e => e.key === 'Enter' && submit() }),
        ] }),

        // 비밀번호 확인 (signup만)
        mode === 'signup' && jsxs('div', { className: 'field-wrap', children: [
          jsx('label', { children: '비밀번호 확인' }),
          jsx('input', { className: 'field', type: 'password', placeholder: '동일하게 입력',
            value: pw2, onChange: e => setPw2(e.target.value),
            onKeyDown: e => e.key === 'Enter' && submit() }),
        ] }),

        jsx('p', { className: 'auth-error', children: err }),
        msg && jsx('p', { style: { fontSize: 12, color: '#1A7A4A', marginTop: 8, lineHeight: 1.6 }, children: msg }),

        jsx('button', { className: 'btn', onClick: submit, disabled: loading,
          style: { opacity: loading ? 0.6 : 1 },
          children: loading ? '처리 중…' : btnLabels[mode] }),

        // 하단 전환 링크
        mode === 'reset'
          ? jsx('p', { className: 'auth-switch', children:
              jsxs(Fragment, { children: [
                jsx('span', { onClick: () => switchMode('login'), children: '← 로그인으로 돌아가기' }),
              ] }),
            })
          : jsxs('p', { className: 'auth-switch', children: [
              mode === 'login' ? '아직 계정이 없으신가요? ' : '이미 계정이 있으신가요? ',
              jsx('span', { onClick: () => switchMode(mode === 'login' ? 'signup' : 'login'),
                children: mode === 'login' ? '회원가입' : '로그인' }),
            ] }),
      ] }),

      jsx('p', { style: { fontSize: 11, color: 'var(--gray-400)', textAlign: 'center' },
        children: '데이터는 암호화되어 안전하게 보관돼요' }),
    ] }),
  });
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function BottomNav({ active, onChange }) {
  const items = [
    { id: 'home', Icon: IconHome, label: '홈' },
    { id: 'history', Icon: IconList, label: '내역' },
    { id: 'add', Icon: null, label: '' },
    { id: 'accounts', Icon: IconWallet, label: '자산' },
    { id: 'fixed', Icon: IconFixed, label: '고정비' },
  ];
  return jsx('nav', { className: 'bottom-nav', children: items.map(item => {
    if (item.id === 'add') return jsx('div', { key: 'add', className: 'nav-plus', onClick: () => onChange('add'), children: jsx(IconPlus, { size: 20, color: 'white' }) });
    const on = active === item.id;
    return jsxs('div', { key: item.id, className: 'nav-item', onClick: () => onChange(item.id), children: [jsx(item.Icon, { size: 20, color: on ? 'var(--black)' : 'var(--gray-400)', sw: on ? 2 : 1.5 }), jsx('span', { className: `nav-label ${on ? 'active' : ''}`, children: item.label })] });
  }) });
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [authUser, setAuthUser]   = useState(undefined);
  const [dbReady, setDbReady]     = useState(false);
  const [onboarded, setOnboardedState] = useState(null);
  const [tab, setTab]             = useState('home');
  const [prevTab, setPrevTab]     = useState('home');
  const [editing, setEditing]     = useState(null);
  const [settings, setSettings]   = useState(false);
  const [homeTxnDetail, setHomeTxnDetail] = useState(null);
  const [showAuth, setShowAuth]   = useState(false);
  const [globalRate, setGlobalRate] = useState(normalizeRate(getRate().rate));
  const [syncBadge, setSyncBadge] = useState(getSyncStatusGlobal());

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setAuthUser(data.session?.user ?? null));
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setAuthUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => { fetchLatestRate().then(r => setGlobalRate(normalizeRate(r))); }, []);
  useEffect(() => {
    const id = setInterval(() => setSyncBadge(getSyncStatusGlobal()), 400);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (authUser === undefined) return;
    if (!authUser) {
      setActiveScopeUserId(null);
      setDbReady(true);
      setOnboardedState(isOnboarded());
      return;
    }
    setDbReady(false);
    setOnboardedState(null);
    (async () => {
      try {
        setActiveScopeUserId(authUser.id);
        await dbLoadAll();
        const firstLogin = await isFirstAppLogin(authUser.id);
        const guestExists = hasAnyAppData(getGuestDataset());
        const migrationDone = getMigrationDone(authUser.id);
        log.info('AUTH', 'login flow 상태', { uid: authUser.id, firstLogin, guestExists, migrationDone, currentScope: getStorageScope(authUser.id) });
        if (firstLogin && guestExists && !migrationDone) {
          const ok = window.confirm('비로그인 상태에서 저장된 데이터를 현재 계정으로 가져올까요?');
          if (ok) {
            const imported = await migrateGuestToCurrentUserSafely(authUser.id);
            if (imported) alert('[success] 첫 로그인 데이터 가져오기 완료');
          } else {
            localStorage.setItem(META.GUEST_IMPORT_DISMISSED(authUser.id), '1');
            alert('[success] 빈 계정 시작');
          }
        }
        await dbLoadAll();
        setOnboardedState(isOnboarded());
      } catch (e) {
        log.error('AUTH', 'login flow 오류', e);
        setSyncStatusGlobal('error', e?.message || '로그인 동기화 실패');
        setOnboardedState(isOnboarded());
      } finally {
        setDbReady(true);
      }
    })();
  }, [authUser]);

  const handleSignOut = async () => {
    await supabase.auth.signOut();
    setShowAuth(false);
    setActiveScopeUserId(null);
    setOnboardedState(isOnboarded());
  };

  if (authUser === undefined || onboarded === null || !dbReady) return null;
  if (showAuth) return jsx(AuthPage, { onAuth: () => setShowAuth(false), onClose: () => setShowAuth(false) });
  if (!onboarded) return jsx(Onboarding, { onDone: async (payload = {}) => {
    const dataset = {
      ...getCurrentDataset(),
      accounts: payload.accounts || getAccounts(),
      fixedExp: payload.fixedExp || getFixedExp(),
      fixedInc: payload.fixedInc || getFixedInc(),
      onboarded: true,
    };
    if (authUser) await dbSaveAll({ dataset, allowDestructive: true, reason: '온보딩 완료' });
    else applyDatasetToLocal(dataset);
    markOnboarded();
    setOnboardedState(true);
  }, onLogin: () => setShowAuth(true) });
  if (settings) return jsx(SettingsPage, { onClose: () => setSettings(false), onSignOut: handleSignOut, onShowAuth: () => { setSettings(false); setShowAuth(true); }, authUser });
  if (homeTxnDetail) return jsx('div', { className: 'app-shell', children: jsx(TxnDetail, { txn: homeTxnDetail, globalRate, onBack: () => setHomeTxnDetail(null), onEdit: t => { setHomeTxnDetail(null); setEditing(t); setPrevTab('home'); setTab('add'); } }) });
  if (tab === 'add') return jsx('div', { className: 'app-shell', children: jsx(AddTransaction, { editing, onDone: () => { setEditing(null); setTab(prevTab); } }) });

  return jsxs('div', { className: 'app-shell', children: [
    syncBadge.state !== 'idle' && jsx('div', { className: 'page', style: { paddingBottom: 0 }, children: jsx('div', { className: 'panel', style: { marginBottom: 0, padding: '10px 14px' }, children: `[${syncBadge.state}] ${syncBadge.message || ''}` }) }),
    tab === 'home'     && jsx(HomeTab,     { onOpenSettings: () => setSettings(true), onDetailOpen: t => setHomeTxnDetail(t), authUser, globalRate }),
    tab === 'history'  && jsx(HistoryTab,  { onEdit: t => { setEditing(t); setPrevTab(tab); setTab('add'); }, globalRate }),
    tab === 'stats'    && jsx(StatsTab,    { globalRate }),
    tab === 'accounts' && jsx(AccountsTab, { globalRate }),
    jsx(BottomNav, { tab, setTab })
  ] });
}

createRoot(document.getElementById('root')).render(jsx(StrictMode, { children: jsx(App, {}) }));

// ─── Service Worker 등록 ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/money/service-worker.js', { scope: '/money/' })
      .then(reg => console.log('[SW] 등록 완료:', reg.scope))
      .catch(err => console.warn('[SW] 등록 실패:', err));
  });
}
</script>
</body>
</html>
