<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>함께해요 — by Brezel</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥨</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Marcellus&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #FDF8F4;
    --warm:     #FEF3EB;
    --orange:   #D4622A;
    --orange-l: #E8845A;
    --orange-d: #B04E1F;
    --amber:    #E8A84C;
    --ink:      #1C1410;
    --bgo:      #ff8345;
    --ink-soft: #273d26;
    --muted:    #9A8070;
    --border:   #EAD9CC;
    --green:    #4d4d4d;
    --grey:     #3b3b3b;
    --meet:     #513e34;
    --meet-l:   #775b4b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--grey); min-height:100vh; }

  /* ── HEADER ── */
  header { background:var(--bgo); padding:0 2rem; position:sticky; top:0; z-index:100; }
  .header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:68px; }
  .logo-img { height:45px; filter:brightness(0) invert(1); opacity:0.95; cursor:pointer; }
  nav { display:flex; gap:0.2rem; align-items:center; }
  nav a, nav button { background:none; border:none; color:rgba(255,255,255,0.65); font-family:'Noto Sans KR',sans-serif; font-size:0.8rem; padding:0.4rem 0.7rem; cursor:pointer; border-radius:20px; transition:all 0.2s; white-space:nowrap; text-decoration:none; display:inline-block; }
  nav a:hover, nav button:hover { background:rgba(255,255,255,0.1); color:white; }
  nav a.active { color:white; background:rgba(255,255,255,0.15); }
  .btn-write { background:var(--meet)!important; color:white!important; font-weight:500!important; margin-left:0.5rem; padding:0.45rem 1rem!important; }
  .btn-write:hover { background:var(--meet-l)!important; }

  /* ── LOADING ── */
  .loading-bar { height:3px; background:linear-gradient(90deg,var(--meet),var(--orange),var(--meet)); background-size:200% 100%; animation:shimmer 1.4s infinite; display:none; }
  .loading-bar.active { display:block; }
  @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

  /* ── HERO ── */
  .hero { background:var(--bgo); padding:5rem 2rem 4.5rem; text-align:center; position:relative; overflow:hidden; }
  .hero::before { content:''; position:absolute; inset:0; z-index:0; background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23FFFFFF' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
  .hero-inner { position:relative; z-index:1; }
  .hero-badge { display:inline-block; background:rgba(255,255,255,0.9); border:1px solid rgb(60,33,18); color:var(--grey); font-size:0.72rem; letter-spacing:0.18em; padding:0.35rem 1rem; border-radius:20px; margin-bottom:1.5rem; font-weight:500; }
  .hero h1 { font-family:"Libre Baskerville", serif; font-size:clamp(3.2rem,5vw,4.5rem); letter-spacing: -0.03em; color:white; line-height:1; margin-bottom:1.5rem; }
  .hero h1 em { position: relative; z-index: 2; color:var(--meet); font-style:italic; }
  .hero p { color:rgba(255,255,255,0.8); font-size:0.95rem; font-weight:300; max-width:460px; margin:0 auto 3rem; line-height:1.75; }
  .hero-stats { display:flex; justify-content:center; gap:3rem; flex-wrap:wrap; }
  .stat { text-align:center; position:relative; }
  .stat-num { font-family:"Libre Baskerville", serif;  font-size:2.2rem; font-weight:bold; color:var(--meet); display:block; line-height:1; }
  .stat-label { font-size:0.68rem; color:rgba(255,255,255,0.5); letter-spacing:0.1em; margin-top:0.3rem; text-transform:uppercase; }
  .stat:not(:last-child)::after { content:''; position:absolute; right:-1.5rem; top:15%; height:70%; width:2px; background:rgba(255,255,255,0.5); }

  /* ── SEARCH ── */
  .search-section { background:var(--warm); border-bottom:1px solid var(--border); padding:1.25rem 2rem; position:sticky; top:68px; z-index:90; }
  .search-inner { max-width:680px; margin:0 auto; position:relative; }
  .search-icon { position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; font-size:0.95rem; }
  #searchInput { width:100%; padding:0.75rem 1rem 0.75rem 2.7rem; border:1.5px solid var(--border); border-radius:12px; font-family:'Noto Sans KR',sans-serif; font-size:0.875rem; background:white; color:var(--ink); outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
  #searchInput:focus { border-color:var(--orange-l); box-shadow:0 0 0 3px rgba(212,98,42,0.1); }
  #searchInput::placeholder { color:var(--muted); }

  /* ── MAIN ── */
  .main-content { max-width:1200px; margin:0 auto; padding:2.5rem 2rem; display:grid; grid-template-columns:220px 1fr; gap:2.5rem; align-items:start; }
  .sidebar { position:sticky; top:160px; }
  .sidebar-section { margin-bottom:2rem; }
  .sidebar-title { font-size:0.62rem; letter-spacing:0.18em; color:var(--muted); text-transform:uppercase; font-weight:500; margin-bottom:0.75rem; padding-left:0.5rem; }
  .cat-list { list-style:none; }
  .cat-item { display:flex; align-items:center; gap:0.6rem; padding:0.55rem 0.75rem; border-radius:10px; cursor:pointer; transition:all 0.15s; margin-bottom:0.15rem; font-size:0.855rem; color:var(--ink-soft); border:1.5px solid transparent; }
  .cat-item:hover { background:white; color:var(--meet); }
  .cat-item.active { background:white; color:var(--meet); border-color:var(--meet); font-weight:500; }
  .cat-icon { font-size:1rem; flex-shrink:0; }
  .cat-count { margin-left:auto; font-size:0.68rem; background:var(--border); color:var(--muted); border-radius:10px; padding:0.1rem 0.5rem; }
  .cat-item.active .cat-count { background:var(--meet-l); color:var(--meet); }

  /* ── CONTENT ── */
  .content-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
  .content-title { font-family:'Noto Sans KR',sans-serif; font-size:1.4rem; color:var(--grey); }
  .btn-create { background:var(--meet); color:white; border:none; border-radius:20px; padding:0.45rem 1.1rem; font-family:'Noto Sans KR',sans-serif; font-size:0.8rem; font-weight:500; cursor:pointer; transition:background 0.2s; }
  .btn-create:hover { background:#203080; }

  /* ── CARDS ── */
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.25rem; }
  .card { background:white; border:1.5px solid var(--border); border-left:3px solid var(--meet); border-radius:16px; padding:1.5rem; cursor:default; transition:all 0.2s; position:relative; animation:fadeUp 0.35s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
  .card:hover { border-color:var(--meet); box-shadow:0 8px 28px rgba(48,80,160,0.1); transform:translateY(-2px); }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.9rem; }
  .card-cat { display:inline-flex; align-items:center; gap:0.35rem; font-size:0.68rem; font-weight:600; letter-spacing:0.06em; padding:0.25rem 0.7rem; border-radius:20px; background:var(--meet-l); color:var(--meet); }
  .badge { font-size:0.62rem; font-weight:600; padding:0.2rem 0.55rem; border-radius:10px; }
  .badge-online  { background:rgba(60,100,200,0.1); color:#3060C0; }
  .badge-offline { background:rgba(212,98,42,0.1);  color:var(--orange-d); }
  .badge-recurring { background:rgba(232,168,76,0.15); color:#8A6010; }
  .badge-closed  { background:#f0f0f0; color:#aaa; }
  .card-title { font-size:0.95rem; font-weight:500; line-height:1.55; margin-bottom:0.5rem; color:var(--grey); }
  .card-excerpt { font-size:0.81rem; color:var(--muted); line-height:1.7; margin-bottom:0.9rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .meet-info { display:flex; flex-direction:column; gap:0.3rem; margin-bottom:1rem; }
  .meet-info-row { display:flex; align-items:center; gap:0.4rem; font-size:0.78rem; color:var(--ink-soft); }
  .card-footer { display:flex; align-items:center; justify-content:space-between; font-size:0.73rem; color:var(--muted); border-top:1px solid var(--border); padding-top:0.85rem; }
  .join-btn { display:inline-flex; align-items:center; gap:0.35rem; background:var(--meet); color:white; border:none; border-radius:8px; padding:0.35rem 0.9rem; font-size:0.75rem; font-family:'Noto Sans KR',sans-serif; font-weight:500; text-decoration:none; transition:background 0.15s; cursor:pointer; }
  .join-btn:hover { background:#203080; }
  .join-btn.closed { background:var(--border); color:var(--muted); cursor:default; pointer-events:none; }

  /* ── MODALS ── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(28,20,16,0.55); backdrop-filter:blur(6px); z-index:200; align-items:center; justify-content:center; padding:1rem; }
  .modal-overlay.open { display:flex; }
  .modal { background:white; border-radius:22px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:2.5rem; animation:slideUp 0.3s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
  .modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.75rem; }
  .modal-title { font-family:'Cormorant Garamond',serif; font-size:1.5rem; color:var(--ink); }
  .modal-sub { font-size:0.78rem; color:var(--muted); margin-top:0.25rem; }
  .modal-close { background:var(--bg); border:none; border-radius:50%; width:36px; height:36px; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s; }
  .modal-close:hover { background:var(--border); }
  .form-group { margin-bottom:1.2rem; }
  .form-label { display:block; font-size:0.78rem; font-weight:500; color:var(--ink-soft); margin-bottom:0.45rem; }
  .form-label span { color:var(--orange); }
  .form-input,.form-select,.form-textarea { width:100%; font-family:'Noto Sans KR',sans-serif; font-size:0.865rem; border:1.5px solid var(--border); border-radius:10px; padding:0.7rem 1rem; color:var(--ink); background:var(--bg); outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
  .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--meet); box-shadow:0 0 0 3px var(--meet-l); background:white; }
  .form-textarea { resize:vertical; min-height:100px; line-height:1.65; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .btn-primary { width:100%; background:var(--meet); color:white; border:none; border-radius:12px; padding:0.9rem; font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; margin-top:0.5rem; transition:background 0.2s; }
  .btn-primary:hover { background:var(--meet-l); }
  .btn-primary:disabled { background:var(--muted); cursor:not-allowed; }
  .pending-notice { background:rgba(232,168,76,0.1); border:1px solid rgba(232,168,76,0.35); border-radius:10px; padding:0.85rem 1.1rem; font-size:0.8rem; color:#8A6010; line-height:1.6; margin-bottom:1.5rem; }
  .submit-status { font-size:0.8rem; text-align:center; margin-top:0.75rem; min-height:1.2em; color:var(--muted); }

  /* ── MOBILE FAB ── */
  .mobile-fab { display:none; position:fixed; bottom:1.5rem; right:1.5rem; z-index:150; background:var(--meet); color:white; border:none; border-radius:50px; padding:0.75rem 1.25rem; font-family:'Noto Sans KR',sans-serif; font-size:0.875rem; font-weight:500; cursor:pointer; box-shadow:0 4px 20px rgba(48,80,160,0.4); }
  .mobile-fab:hover { background:#203080; }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(16px); background:var(--ink); color:white; padding:0.75rem 1.5rem; border-radius:30px; font-size:0.83rem; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { background:var(--meet); }
  .toast.error { background:#A83030; }

  /* ── EMPTY / SKELETON ── */
  .empty-state { text-align:center; padding:4rem 2rem; color:var(--muted); grid-column:1/-1; }
  .empty-icon { font-size:3rem; margin-bottom:1rem; }
  .empty-state p { font-size:0.88rem; line-height:1.7; }
  .skel { background:white; border:1.5px solid var(--border); border-radius:16px; padding:1.5rem; }
  .skel-line { background:linear-gradient(90deg,var(--border) 25%,#f5ece4 50%,var(--border) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; margin-bottom:0.75rem; }

  /* ── FOOTER ── */
  .site-footer { border-top:1px solid var(--border); background:var(--warm); padding:1.5rem 2rem; margin-top:2rem; }
  .footer-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem; }
  .footer-logo { font-size:0.9rem; font-weight:500; color:var(--muted); }
  .footer-links { display:flex; align-items:center; gap:0.6rem; font-size:0.78rem; color:var(--muted); }
  .footer-links a { color:var(--muted); text-decoration:none; transition:color 0.15s; }
  .footer-links a:hover { color:var(--orange); }
  .footer-dot { opacity:0.4; }

  @media (max-width:768px) {
    .main-content { grid-template-columns:1fr; padding:1.5rem 1rem 5rem; }
    .sidebar { position:static; }
    .cat-list { display:flex; flex-wrap:wrap; gap:0.4rem; }
    .cat-item { font-size:0.78rem; }
    nav { display:none; }
    .mobile-fab { display:flex; align-items:center; gap:0.4rem; }
    .hero { padding:3.5rem 1.5rem 3rem; }
    .modal { padding:1.5rem; }
    .form-row { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a href="/"><img class="logo-img" src="logo.png" alt="by Brezel"></a>
    <nav>
      <a href="/">정보 아카이브</a>
      <a href="/meetup" class="active">함께해요</a>
      <button class="btn-write" onclick="openSubmit()">🤝 모임 만들기</button>
    </nav>
  </div>
</header>
<div class="loading-bar" id="loadingBar"></div>

<button class="mobile-fab" onclick="openSubmit()">🤝 모임 만들기</button>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-badge">🇩🇪 독일 거주 여성 커뮤니티</div>
    <h1>Better <em>together</em></h1>
    <p>스터디, 운동, 육아, 맛집 탐방<br>함께하고 싶은 모임을 만들어보세요.</p>
    <div class="hero-stats">
      <div class="stat"><span class="stat-num" id="totalCount">—</span><div class="stat-label">모임</div></div>
      <div class="stat"><span class="stat-num">875</span><div class="stat-label">멤버</div></div>
    </div>
  </div>
</section>

<!-- SEARCH -->
<div class="search-section">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="모임 이름, 도시, 카테고리로 검색해보세요…" oninput="renderCards()">
  </div>
</div>

<!-- MAIN -->
<div class="main-content">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">카테고리</div>
      <ul class="cat-list" id="catList"></ul>
    </div>
  </aside>
  <main>
    <div class="content-header">
      <div class="content-title" id="contentTitle">전체 모임</div>
    </div>
    <div class="cards-grid" id="cardsGrid">
      <div class="skel"><div class="skel-line" style="height:20px;width:40%"></div><div class="skel-line" style="height:16px;width:80%"></div><div class="skel-line" style="height:14px;width:60%"></div></div>
      <div class="skel"><div class="skel-line" style="height:20px;width:35%"></div><div class="skel-line" style="height:16px;width:75%"></div><div class="skel-line" style="height:14px;width:55%"></div></div>
      <div class="skel"><div class="skel-line" style="height:20px;width:45%"></div><div class="skel-line" style="height:16px;width:70%"></div><div class="skel-line" style="height:14px;width:65%"></div></div>
    </div>
  </main>
</div>

<!-- SUBMIT MODAL -->
<div class="modal-overlay" id="submitModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">🤝 모임 만들기</div>
        <div class="modal-sub">함께하고 싶은 모임을 올려주세요</div>
      </div>
    </div>
    <div class="pending-notice">📋 제출한 내용은 운영자 승인 후 게시됩니다.</div>

    <div class="form-group">
      <label class="form-label">모임명 <span>*</span></label>
      <input class="form-input" id="m-title" placeholder="예: 베를린 주말 등산 모임">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <select class="form-select" id="m-cat">
          <option value="">선택하세요</option>
          <option>스터디</option><option>운동</option><option>육아</option>
          <option>맛집·카페</option><option>문화·여행</option><option>기타</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">모임 형태</label>
        <select class="form-select" id="m-type">
          <option value="오프라인">📍 오프라인</option>
          <option value="온라인">💻 온라인</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">모임 설명 <span>*</span></label>
      <textarea class="form-textarea" id="m-desc" placeholder="어떤 모임인지 소개해주세요."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">도시</label>
        <input class="form-input" id="m-city" placeholder="예: 베를린, 뮌헨">
      </div>
      <div class="form-group">
        <label class="form-label">장소</label>
        <input class="form-input" id="m-location" placeholder="예: 카페 이름, 공원">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">일시</label>
        <input class="form-input" id="m-date" type="datetime-local">
      </div>
      <div class="form-group">
        <label class="form-label">모집 마감일</label>
        <input class="form-input" id="m-deadline" type="date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">정기 여부</label>
        <select class="form-select" id="m-recurring">
          <option value="일회성">일회성</option>
          <option value="정기모임">정기모임</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">연락처 링크 <span>*</span></label>
      <input class="form-input" id="m-contact" placeholder="오픈채팅, 인스타그램 등 링크를 입력해주세요">
    </div>
    <div class="form-group">
      <label class="form-label">닉네임 (선택)</label>
      <input class="form-input" id="m-author" placeholder="예: 베를린새댁, 익명">
    </div>

    <button class="btn-primary" id="submitBtn" onclick="submitForm()">모임 올리기 →</button>
    <div class="submit-status" id="submitStatus"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer class="site-footer">

  </div>
</footer>

<script>
const CATS = [
  {key:'all',      label:'전체',     icon:'🤝'},
  {key:'스터디',   label:'스터디',   icon:'📚'},
  {key:'운동',     label:'운동',     icon:'🏃'},
  {key:'육아',     label:'육아',     icon:'🧸'},
  {key:'맛집·카페',label:'맛집·카페',icon:'☕'},
  {key:'문화·여행',label:'문화·여행',icon:'🎭'},
  {key:'기타',     label:'기타',     icon:'💬'},
];

const API = '/api/meetup';
let allRecords = [];
let currentCat = 'all';

// ── API ──
async function loadRecords() {
  setLoading(true);
  try {
    const res  = await fetch(API);
    const data = await res.json();
    allRecords = (data.records || []).map(r => {
      const f = r.fields;
      return {
        id:          r.id,
        title:       f['title']            || '모임명 없음',
        description: f['description']      || '',
        category:    f['category']         || '',
        type:        f['type']             || '오프라인',
        city:        f['city']             || '',
        location:    f['location']         || '',
        date:        f['date']             || '',
        deadline:    f['deadline']         || '',
        recurring:   f['recurring']        || '일회성',
        contactUrl:  f['contact_url']      || '',
        author:      f['author_nickname']  || '익명',
        dateRaw:     f['submission_date']  || '',
      };
    });
    document.getElementById('totalCount').textContent = allRecords.length;
    renderCatList();
    renderCards();
  } catch(e) {
    document.getElementById('cardsGrid').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><p>데이터를 불러오지 못했어요.<br>${e.message}</p></div>`;
  }
  setLoading(false);
}

function setLoading(on) {
  document.getElementById('loadingBar').classList.toggle('active', on);
}

// ── SIDEBAR ──
function renderCatList() {
  const ul = document.getElementById('catList');
  ul.innerHTML = '';
  CATS.forEach(c => {
    const count = c.key === 'all' ? allRecords.length : allRecords.filter(d => d.category === c.key).length;
    const li = document.createElement('li');
    li.className = 'cat-item' + (currentCat === c.key ? ' active' : '');
    li.innerHTML = `<span class="cat-icon">${c.icon}</span>${c.label}<span class="cat-count">${count}</span>`;
    li.onclick = () => filterCat(c.key);
    ul.appendChild(li);
  });
}

function filterCat(key) {
  currentCat = key;
  const cat = CATS.find(c => c.key === key);
  document.getElementById('contentTitle').textContent = key === 'all' ? '전체 모임' : cat?.label + ' 모임';
  document.getElementById('searchInput').value = '';
  renderCatList();
  renderCards();
}

// ── RENDER ──
function isExpired(deadline) {
  if (!deadline) return false;
  return new Date(deadline) < new Date();
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('ko-KR', { month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let items = currentCat === 'all' ? allRecords : allRecords.filter(d => d.category === currentCat);
  if (q) items = items.filter(d =>
    d.title.toLowerCase().includes(q) ||
    d.description.toLowerCase().includes(q) ||
    d.city.toLowerCase().includes(q) ||
    d.category.toLowerCase().includes(q)
  );

  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  if (!items.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🤝</div><p>아직 모임이 없어요.<br>첫 번째 모임을 만들어보세요!</p></div>`;
    return;
  }

  items.forEach((item, i) => {
    const expired  = isExpired(item.deadline);
    const isOnline = item.type === '온라인';
    const div = document.createElement('div');
    div.className = 'card';
    div.style.animationDelay = (i * 0.04) + 's';
    div.innerHTML = `
      <div class="card-top">
        <span class="card-cat">${item.category || '모임'}</span>
        <div style="display:flex;gap:0.3rem;flex-wrap:wrap;justify-content:flex-end">
          <span class="badge ${isOnline ? 'badge-online' : 'badge-offline'}">${isOnline ? '💻 온라인' : '📍 오프라인'}</span>
          ${item.recurring === '정기모임' ? '<span class="badge badge-recurring">🔄 정기</span>' : ''}
          ${expired ? '<span class="badge badge-closed">마감</span>' : ''}
        </div>
      </div>
      <div class="card-title">${item.title}</div>
      ${item.description ? `<div class="card-excerpt">${item.description}</div>` : ''}
      <div class="meet-info">
        ${item.city ? `<div class="meet-info-row"><span>📍</span><span>${item.city}${item.location ? ' · ' + item.location : ''}</span></div>` : ''}
        ${item.date ? `<div class="meet-info-row"><span>📅</span><span>${formatDate(item.date)}</span></div>` : ''}
        ${item.deadline && !expired ? `<div class="meet-info-row"><span>⏰</span><span>마감 ${new Date(item.deadline).toLocaleDateString('ko-KR',{month:'long',day:'numeric'})}</span></div>` : ''}
      </div>
      <div class="card-footer">
        <span>${item.author}</span>
        ${item.contactUrl
          ? `<a class="join-btn ${expired ? 'closed' : ''}" ${expired ? '' : `href="${item.contactUrl}" target="_blank" rel="noopener"`}>${expired ? '모집 마감' : '참여하기 →'}</a>`
          : ''}
      </div>`;
    grid.appendChild(div);
  });
}

// ── SUBMIT ──
function openSubmit()  { document.getElementById('submitModal').classList.add('open'); }
function closeSubmit() { document.getElementById('submitModal').classList.remove('open'); }

document.getElementById('submitModal').addEventListener('click', e => {
  if (e.target === document.getElementById('submitModal')) closeSubmit();
});

async function submitForm() {
  const btn    = document.getElementById('submitBtn');
  const status = document.getElementById('submitStatus');
  const title   = document.getElementById('m-title').value.trim();
  const desc    = document.getElementById('m-desc').value.trim();
  const contact = document.getElementById('m-contact').value.trim();

  if (!title || !desc || !contact) {
    showToast('모임명, 설명, 연락처는 필수예요 🙏', 'error'); return;
  }

  const fields = {
    'title':            title,
    'description':      desc,
    'category':         document.getElementById('m-cat').value,
    'type':             document.getElementById('m-type').value,
    'city':             document.getElementById('m-city').value.trim(),
    'location':         document.getElementById('m-location').value.trim(),
    'date':             document.getElementById('m-date').value || '',
    'deadline':         document.getElementById('m-deadline').value || '',
    'recurring':        document.getElementById('m-recurring').value,
    'contact_url':      contact,
    'author_nickname':  document.getElementById('m-author').value.trim() || '익명',
    'submission_date':  new Date().toISOString().split('T')[0],
  };
  Object.keys(fields).forEach(k => { if (!fields[k] && fields[k] !== 0) delete fields[k]; });

  btn.disabled = true;
  btn.textContent = '제출 중...';
  status.textContent = '저장하고 있어요...';
  status.style.color = 'var(--muted)';

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields }),
    });
    if (!res.ok) throw new Error('제출 실패');
    closeSubmit();
    ['m-title','m-desc','m-cat','m-city','m-location','m-date','m-deadline','m-members','m-contact','m-author']
      .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    showToast('모임이 등록됐어요! 운영자 승인 후 게시됩니다 🥨', 'success');
  } catch(e) {
    status.style.color = '#A83030';
    status.textContent = '오류가 발생했어요. 다시 시도해주세요.';
  } finally {
    btn.disabled = false;
    btn.textContent = '모임 올리기 →';
    setTimeout(() => { status.textContent = ''; status.style.color = ''; }, 5000);
  }
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

loadRecords();
</script>
</body>
</html>
